              {rows.map((row, ri) => (
                <tr key={ri}>
                  <td>{ri+1}</td>
                  <td>{new Date(responses[ri].submittedAt).toLocaleString()}</td>
                  {headers.map(h => <td key={h} title={String(row[h]??'')}>{
                    Array.isArray(row[h]) ? row[h].join(', ') : String(row[h] ?? '')
                  }</td>)}
                  <td><button className="icon-btn" onClick={()=>onDelete(ri)} title="Delete response">✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------
   COLLECT: top-level module (forms list + builder + fill + responses)
----------------------------------------------------------------*/
function CollectModule({ onAnalyze }){
  const [forms, setForms] = useState(()=>loadForms());
  const [view, setView] = useState('list'); // list | build | fill | responses
  const [activeFormId, setActiveFormId] = useState(null);
  const [responses, setResponses] = useState([]);

  const formList = Object.values(forms).sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));
  const activeForm = activeFormId ? forms[activeFormId] : null;

  const persistForms = (next) => { setForms(next); saveForms(next); };

  const createForm = () => {
    const f = newForm();
    persistForms({...forms, [f.id]: f});
    setActiveFormId(f.id);
    setView('build');
  };

  const editForm = (id) => { setActiveFormId(id); setView('build'); };
  const fillForm = (id) => { setActiveFormId(id); setView('fill'); };
  const viewResponses = (id) => {
    setActiveFormId(id);
    setResponses(loadResponses(id));
    setView('responses');
  };
  const deleteForm = (id) => {
    if(!confirm('Delete this form and all its responses? This cannot be undone.')) return;
    const next = {...forms};
    delete next[id];
    persistForms(next);
    try{ localStorage.removeItem(RESPONSES_KEY_PREFIX + id); }catch(e){}
  };
  const saveFormDraft = (draft) => {
    persistForms({...forms, [draft.id]: draft});
    setView('list');
  };
  const submitResponse = (answers) => {
    const next = [...loadResponses(activeFormId), { submittedAt: new Date().toISOString(), answers }];
    saveResponses(activeFormId, next);
  };
  const deleteResponse = (idx) => {
    const next = responses.filter((_,i)=>i!==idx);
    setResponses(next);
    saveResponses(activeFormId, next);
  };

  return (
    <div className="collect-wrap">
      {view === 'list' && (
        <React.Fragment>
          <div className="q-row" style={{alignItems:'center',marginBottom:'20px'}}>
            <p className="section-label" style={{margin:0}}>Your forms</p>
            <div style={{flex:1}} />
            <button className="btn" onClick={createForm}>+ New form</button>
          </div>
          {formList.length === 0 ? (
            <div className="empty-state">
              <div className="icon">▤</div>
              <h2>No forms yet</h2>
              <p>Build a survey with text, number, choice, GPS, photo, and repeat-group questions — KoboToolbox style.</p>
              <button className="btn" style={{marginTop:'14px'}} onClick={createForm}>+ Create your first form</button>
            </div>
          ) : (
            <div className="form-list">
              {formList.map(f => (
                <div className="form-card" key={f.id}>
                  <div>
                    <div className="fc-title">{f.title || 'Untitled form'}</div>
                    <div className="fc-meta">{f.questions.length} question{f.questions.length===1?'':'s'} · created {new Date(f.createdAt).toLocaleDateString()}</div>
                  </div>
                  <div className="fc-actions">
                    <button className="btn-sm" onClick={()=>fillForm(f.id)}>Fill out</button>
                    <button className="btn-sm" onClick={()=>viewResponses(f.id)}>Responses</button>
                    <button className="btn-sm" onClick={()=>editForm(f.id)}>Edit</button>
                    <button className="icon-btn" onClick={()=>deleteForm(f.id)} title="Delete form">✕</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </React.Fragment>
      )}

      {view === 'build' && activeForm && (
        <FormBuilder form={activeForm} onSave={saveFormDraft} onBack={()=>setView('list')} />
      )}

      {view === 'fill' && activeForm && (
        <FormFillScreen form={activeForm} onSubmit={submitResponse} onCancel={()=>setView('list')} />
      )}

      {view === 'responses' && activeForm && (
        <ResponsesView form={activeForm} responses={responses} onBack={()=>setView('list')} onDelete={deleteResponse} onAnalyze={onAnalyze} />
      )}
    </div>
  );
}

/* ---------------------------------------------------------------
   ANALYZE: Pivot table / cross-tabulation builder
----------------------------------------------------------------*/
function PivotTable({ rows, columnInfo, onStateChange }){
  const categoricalCols = columnInfo.filter(c => c.type === 'text' || c.type === 'boolean' || c.type === 'date');
  const numericCols = columnInfo.filter(c => c.type === 'number');

  const [rowField, setRowField] = useState('');
  const [colField, setColField] = useState('');
  const [valueField, setValueField] = useState('');
  const [aggType, setAggType] = useState('count'); // count | sum | average

  React.useEffect(() => {
    if(!rowField && categoricalCols.length > 0) setRowField(categoricalCols[0].name);
    if(!colField && categoricalCols.length > 1) setColField(categoricalCols[1].name);
    if(!valueField && numericCols.length > 0) setValueField(numericCols[0].name);
  }, [columnInfo]);

  const cellLabel = (v) => {
    if(v === null || v === undefined || v === '') return '(blank)';
    if(typeof v === 'boolean') return String(v);
    return String(v);
  };

  const pivot = React.useMemo(() => {
    if(!rowField) return null;
    const rowKeys = new Set();
    const colKeys = new Set();
    const cellMap = {}; // `${r}|||${c}` -> array of values (for sum/avg) or count

    rows.forEach(r => {
      const rk = cellLabel(r[rowField]);
      const ck = colField ? cellLabel(r[colField]) : '__all__';
      rowKeys.add(rk);
      colKeys.add(ck);
      const key = rk + '|||' + ck;
      if(!cellMap[key]) cellMap[key] = [];
      if(aggType === 'count'){
        cellMap[key].push(1);
      } else {
        const v = r[valueField];
        if(typeof v === 'number' && !isNaN(v)) cellMap[key].push(v);
      }
    });

    const rowList = Array.from(rowKeys).sort();
    const colList = colField ? Array.from(colKeys).sort() : ['__all__'];

    const compute = (arr) => {
      if(!arr || arr.length === 0) return aggType === 'count' ? 0 : null;
      if(aggType === 'count') return arr.length;
      if(aggType === 'sum') return arr.reduce((s,v)=>s+v,0);
      if(aggType === 'average') return arr.reduce((s,v)=>s+v,0) / arr.length;
      return null;
    };

    const grid = rowList.map(rk => {
      const cells = colList.map(ck => compute(cellMap[rk+'|||'+ck]));
      const rowTotal = compute(colList.flatMap(ck => cellMap[rk+'|||'+ck] || []));
      return { rowKey: rk, cells, rowTotal };
    });

    const colTotals = colList.map(ck => compute(rowList.flatMap(rk => cellMap[rk+'|||'+ck] || [])));
    const grandTotal = compute(rowList.flatMap(rk => colList.flatMap(ck => cellMap[rk+'|||'+ck] || [])));

    return { rowList, colList, grid, colTotals, grandTotal };
  }, [rows, rowField, colField, valueField, aggType]);

  React.useEffect(() => {
    if(onStateChange) onStateChange({ rowField, colField, valueField, aggType, pivot });
  }, [pivot, rowField, colField, valueField, aggType]);

  const fmt = (v) => {
    if(v === null || v === undefined) return '—';
    if(aggType === 'average') return formatNum(v);
    if(typeof v === 'number') return v.toLocaleString();
    return String(v);
  };

  const maxCellValue = React.useMemo(() => {
    if(!pivot) return 1;
    let m = 1;
    pivot.grid.forEach(r => r.cells.forEach(v => { if(typeof v === 'number' && v > m) m = v; }));
    return m;
  }, [pivot]);

  const exportPivot = () => {
    if(!pivot) return;
    const headers = [rowField, ...pivot.colList.map(c => c==='__all__' ? 'Total' : c), 'Row total'];
    const expRows = pivot.grid.map(r => {
      const o = { [rowField]: r.rowKey };
      pivot.colList.forEach((c,i) => { o[c==='__all__'?'Total':c] = r.cells[i] ?? ''; });
      o['Row total'] = r.rowTotal ?? '';
      return o;
    });
    downloadCSV(expRows, headers, 'pivot_table');
  };

  if(categoricalCols.length === 0){
    return (
      <div className="empty-state">
        <div className="icon">▦</div>
        <p>No text, boolean, or date columns found to pivot on. Cross-tabulation needs at least one categorical column.</p>
      </div>
    );
  }

  return (
    <div>
      <div className="pivot-controls">
        <div className="pivot-field">
          <label>Rows</label>
          <select value={rowField} onChange={e=>setRowField(e.target.value)}>
            {categoricalCols.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
          </select>
        </div>
        <div className="pivot-field">
          <label>Columns (optional)</label>
          <select value={colField} onChange={e=>setColField(e.target.value)}>
            <option value="">— None —</option>
            {categoricalCols.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
          </select>
        </div>
        <div className="pivot-field">
          <label>Summarize by</label>
          <select value={aggType} onChange={e=>setAggType(e.target.value)}>
            <option value="count">Count of rows</option>
            {numericCols.length > 0 && <option value="sum">Sum of a column</option>}
            {numericCols.length > 0 && <option value="average">Average of a column</option>}
          </select>
        </div>
        {aggType !== 'count' && (
          <div className="pivot-field">
            <label>Value column</label>
            <select value={valueField} onChange={e=>setValueField(e.target.value)}>
              {numericCols.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
            </select>
          </div>
        )}
        <button className="btn-sm primary" onClick={exportPivot} disabled={!pivot}>Export CSV</button>
      </div>

      {pivot && (
        <div className="pivot-table-wrap">
          <table>
            <thead>
              <tr>
                <th>{rowField}</th>
                {pivot.colList.map(c => <th key={c}>{c==='__all__' ? (aggType==='count'?'Count':'Value') : c}</th>)}
                {colField && <th>Row total</th>}
              </tr>
            </thead>
            <tbody>
              {pivot.grid.map(r => (
                <tr key={r.rowKey}>
                  <td>{r.rowKey}</td>
                  {r.cells.map((v,ci) => (
                    <td key={ci} className="pivot-cell">
                      {typeof v === 'number' && aggType==='count' && (
                        <div className="pivot-cell-bar" style={{width:(v/maxCellValue*100)+'%'}}></div>
                      )}
                      {fmt(v)}
                    </td>
                  ))}
                  {colField && <td>{fmt(r.rowTotal)}</td>}
                </tr>
              ))}
              {colField && (
                <tr>
                  <td>Total</td>
                  {pivot.colTotals.map((v,ci) => <td key={ci}>{fmt(v)}</td>)}
                  <td>{fmt(pivot.grandTotal)}</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      )}
      <p className="hint" style={{marginTop:'10px'}}>Tip: pick a row and column field to cross-tabulate two categories — e.g. region by gender, or status by program.</p>
    </div>
  );
}

/* ---------------------------------------------------------------
   ANALYZE: Group-by summary statistics
----------------------------------------------------------------*/
function GroupBySummary({ rows, columnInfo, onStateChange }){
  const categoricalCols = columnInfo.filter(c => c.type === 'text' || c.type === 'boolean' || c.type === 'date');
  const numericCols = columnInfo.filter(c => c.type === 'number');

  const [groupField, setGroupField] = useState('');
  const [statField, setStatField] = useState('');
  const [metrics, setMetrics] = useState(['mean','median','min','max','count']);

  React.useEffect(() => {
    if(!groupField && categoricalCols.length > 0) setGroupField(categoricalCols[0].name);
    if(!statField && numericCols.length > 0) setStatField(numericCols[0].name);
  }, [columnInfo]);

  const cellLabel = (v) => {
    if(v === null || v === undefined || v === '') return '(blank)';
    if(typeof v === 'boolean') return String(v);
    return String(v);
  };

  const allMetrics = [
    { key:'count', label:'Count' },
    { key:'mean', label:'Mean' },
    { key:'median', label:'Median' },
    { key:'std', label:'Std dev' },
    { key:'min', label:'Min' },
    { key:'max', label:'Max' },
    { key:'q1', label:'Q1' },
    { key:'q3', label:'Q3' },
  ];

  const toggleMetric = (key) => {
    setMetrics(m => m.includes(key) ? m.filter(k=>k!==key) : [...m, key]);
  };

  const groups = React.useMemo(() => {
    if(!groupField || !statField) return [];
    const byGroup = {};
    rows.forEach(r => {
      const g = cellLabel(r[groupField]);
      const v = r[statField];
      if(!byGroup[g]) byGroup[g] = [];
      if(typeof v === 'number' && !isNaN(v)) byGroup[g].push(v);
    });
    return Object.entries(byGroup)
      .map(([g, nums]) => ({ group: g, stats: computeStats(nums) }))
      .filter(g => g.stats)
      .sort((a,b) => a.group.localeCompare(b.group));
  }, [rows, groupField, statField]);

  const overallStats = React.useMemo(() => {
    if(!statField) return null;
    const nums = rows.map(r => r[statField]).filter(v => typeof v === 'number' && !isNaN(v));
    return computeStats(nums);
  }, [rows, statField]);

  React.useEffect(() => {
    if(onStateChange) onStateChange({ groupField, statField, metrics, groups, overallStats });
  }, [groups, groupField, statField, metrics, overallStats]);

  const maxMean = React.useMemo(() => {
    let m = 1;
    groups.forEach(g => { const v = g.stats.mean || 0; if(v > m) m = v; });
    return m;
  }, [groups]);

  const exportGroupBy = () => {
    const headers = [groupField, ...metrics.map(m => allMetrics.find(a=>a.key===m).label)];
    const expRows = groups.map(g => {
      const o = { [groupField]: g.group };
      metrics.forEach(m => { o[allMetrics.find(a=>a.key===m).label] = formatNum(g.stats[m]); });
      return o;
    });
    downloadCSV(expRows, headers, 'group_summary');
  };

  if(categoricalCols.length === 0 || numericCols.length === 0){
    return (
      <div className="empty-state">
        <div className="icon">∑</div>
        <p>Group-by summary needs at least one categorical column to group by, and one numeric column to summarize.</p>
      </div>
    );
  }

  return (
    <div>
      <div className="groupby-controls">
        <div className="pivot-field">
          <label>Group by</label>
          <select value={groupField} onChange={e=>setGroupField(e.target.value)}>
            {categoricalCols.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
          </select>
        </div>
        <div className="pivot-field">
          <label>Summarize column</label>
          <select value={statField} onChange={e=>setStatField(e.target.value)}>
            {numericCols.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
          </select>
        </div>
        <button className="btn-sm primary" onClick={exportGroupBy} disabled={groups.length===0}>Export CSV</button>
      </div>

      <div className="q-row" style={{marginBottom:'16px'}}>
        {allMetrics.map(m => (
          <label className="inline" key={m.key}>
            <input type="checkbox" checked={metrics.includes(m.key)} onChange={()=>toggleMetric(m.key)} />
            {m.label}
          </label>
        ))}
      </div>

      {overallStats && (
        <p className="hint" style={{marginBottom:'14px'}}>
          Overall ({statField}): mean {formatNum(overallStats.mean)}, median {formatNum(overallStats.median)}, n={overallStats.count}
        </p>
      )}

      {groups.length === 0 ? (
        <div className="empty-state">
          <div className="icon">—</div>
          <p>No numeric values found for "{statField}" in this column.</p>
        </div>
      ) : (
        <div className="groupby-table-wrap">
          <table>
            <thead>
              <tr>
                <th>{groupField}</th>
                {metrics.map(m => <th key={m}>{allMetrics.find(a=>a.key===m).label}</th>)}
              </tr>
            </thead>
            <tbody>
              {groups.map(g => (
                <tr key={g.group}>
                  <td>{g.group}</td>
                  {metrics.map(m => (
                    <td key={m}>
                      {m === 'mean' ? (
                        <div className="groupby-bar-wrap">
                          <div className="groupby-bar" style={{width:(g.stats.mean/maxMean*60)+'px'}}></div>
                          {formatNum(g.stats[m])}
                        </div>
                      ) : formatNum(g.stats[m])}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      <p className="hint" style={{marginTop:'10px'}}>Tip: compare a numeric column (e.g. income, age, score) across categories (e.g. region, program, status).</p>
    </div>
  );
}

   ANALYZE: Correlation / scatter view
----------------------------------------------------------------*/
/* ---------------------------------------------------------------
   HYPOTHESIS TESTING: t-test and chi-square pure functions
----------------------------------------------------------------*/

// Welch's t-test (unequal variances) — compares means of two groups.
// Returns { t, df, p, meanA, meanB, nA, nB, sdA, sdB }
function welchTTest(a, b){
  const n1 = a.length, n2 = b.length;
  if(n1 < 2 || n2 < 2) return null;
  const m1 = a.reduce((s,v)=>s+v,0)/n1;
  const m2 = b.reduce((s,v)=>s+v,0)/n2;
  const v1 = a.reduce((s,v)=>s+(v-m1)**2,0)/(n1-1);
  const v2 = b.reduce((s,v)=>s+(v-m2)**2,0)/(n2-1);
  const se = Math.sqrt(v1/n1 + v2/n2);
  if(se === 0) return null;
  const t = (m1 - m2) / se;
  // Welch–Satterthwaite degrees of freedom
  const df = (v1/n1 + v2/n2)**2 / ((v1/n1)**2/(n1-1) + (v2/n2)**2/(n2-1));
  // Two-tailed p-value using incomplete beta function approximation
  const p = tDistPValue(Math.abs(t), df);
  return { t, df, p, meanA:m1, meanB:m2, nA:n1, nB:n2, sdA:Math.sqrt(v1), sdB:Math.sqrt(v2) };
}

// Regularised incomplete beta function — Numerical Recipes betai/betacf
function lgamma(z){
  const c=[76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5];
  let y=z,x=z,tmp=x+5.5; tmp-=(x+0.5)*Math.log(tmp); let ser=1.000000000190015;
  for(let j=0;j<6;j++) ser+=c[j]/++y;
  return -tmp+Math.log(2.5066282746310005*ser/x);
}
function betacf(a,b,x){
  const MAXIT=200,EPS=3e-7,FPMIN=1e-30;
  const qab=a+b,qap=a+1,qam=a-1;
  let c=1,d=1-qab*x/qap; if(Math.abs(d)<FPMIN)d=FPMIN; d=1/d; let h=d;
  for(let m=1;m<=MAXIT;m++){
    const m2=2*m;
    let aa=m*(b-m)*x/((qam+m2)*(a+m2));
    d=1+aa*d; if(Math.abs(d)<FPMIN)d=FPMIN; c=1+aa/c; if(Math.abs(c)<FPMIN)c=FPMIN; d=1/d; h*=d*c;
    aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2));
    d=1+aa*d; if(Math.abs(d)<FPMIN)d=FPMIN; c=1+aa/c; if(Math.abs(c)<FPMIN)c=FPMIN; d=1/d;
    const del=d*c; h*=del; if(Math.abs(del-1)<EPS) break;
  }
  return h;
}
function incompleteBeta(a,b,x){
  if(x<=0) return 0; if(x>=1) return 1;
  const bt=Math.exp(lgamma(a+b)-lgamma(a)-lgamma(b)+a*Math.log(x)+b*Math.log(1-x));
  if(x<(a+1)/(a+b+2)) return bt*betacf(a,b,x)/a;
  return 1-bt*betacf(b,a,1-x)/b;
}
function tDistPValue(t,df){
  return incompleteBeta(df/2, 0.5, df/(df+t*t));
}

// Regularised incomplete gamma — series for small x, CF for large x
function regularisedGammaP(a,x){
  if(x<0) return 0;
  if(x<a+1){
    let ap=a,sum=1/a,del=1/a;
    for(let n=0;n<200;n++){ ap++; del*=x/ap; sum+=del; if(Math.abs(del)<Math.abs(sum)*1e-10) break; }
    return sum*Math.exp(-x+a*Math.log(x)-lgamma(a));
  } else {
    const FPMIN=1e-30;
    let b=x+1-a,c=1/FPMIN,d=1/b,h=d;
    for(let i=1;i<=200;i++){
      const an=-i*(i-a); b+=2;
      d=an*d+b; if(Math.abs(d)<FPMIN)d=FPMIN; c=b+an/c; if(Math.abs(c)<FPMIN)c=FPMIN;
      d=1/d; const del=d*c; h*=del; if(Math.abs(del-1)<1e-10) break;
    }
    return 1-Math.exp(-x+a*Math.log(x)-lgamma(a))*h;
  }
}

// Chi-square test of independence between two categorical columns.
// Returns { chi2, df, p, observed, expected, rowKeys, colKeys }
function chiSquareTest(rows, colA, colB){
  const cellLabel = v => (v===null||v===undefined||v==='')?'(blank)':String(v);
  const rowKeys = [...new Set(rows.map(r=>cellLabel(r[colA])))].sort();
  const colKeys = [...new Set(rows.map(r=>cellLabel(r[colB])))].sort();
  const obs = {};
  const rowTotals = {}, colTotals = {}, grand = {n:0};
  rowKeys.forEach(r=>{ rowTotals[r]=0; obs[r]={}; colKeys.forEach(c=>{ obs[r][c]=0; }); });
  colKeys.forEach(c=>{ colTotals[c]=0; });
  rows.forEach(row=>{
    const r=cellLabel(row[colA]), c=cellLabel(row[colB]);
    obs[r][c]++; rowTotals[r]++; colTotals[c]++; grand.n++;
  });
  if(grand.n === 0) return null;
  const df = (rowKeys.length-1)*(colKeys.length-1);
  if(df < 1) return null;
  let chi2 = 0;
  const expected = {};
  rowKeys.forEach(r=>{ expected[r]={}; colKeys.forEach(c=>{
    const exp = rowTotals[r]*colTotals[c]/grand.n;
    expected[r][c] = exp;
    if(exp > 0) chi2 += (obs[r][c]-exp)**2/exp;
  }); });
  const p = 1 - regularisedGammaP(df/2, chi2/2);
  return { chi2, df, p, observed:obs, expected, rowKeys, colKeys, grand:grand.n };
}

function pearsonCorrelation(xs, ys){
  const n = xs.length;
  if(n < 2) return null;
  const meanX = xs.reduce((s,v)=>s+v,0) / n;
  const meanY = ys.reduce((s,v)=>s+v,0) / n;
  let num = 0, denX = 0, denY = 0;
  for(let i=0;i<n;i++){
    const dx = xs[i]-meanX, dy = ys[i]-meanY;
    num += dx*dy; denX += dx*dx; denY += dy*dy;
  }
  if(denX === 0 || denY === 0) return null;
  return num / Math.sqrt(denX*denY);
}

function interpretCorrelation(r){
  if(r === null) return { strength:'undefined', text:"Correlation can't be computed — one of the columns has no variation (every value is the same)." };
  const abs = Math.abs(r);
  const direction = r > 0 ? 'positive' : 'negative';
  let strength;
  if(abs < 0.1) strength = 'negligible';
  else if(abs < 0.3) strength = 'weak';
  else if(abs < 0.5) strength = 'moderate';
  else if(abs < 0.7) strength = 'strong';
  else strength = 'very strong';

  let text;
  if(abs < 0.1){
    text = `There is essentially no linear relationship between these two columns (r = ${r.toFixed(3)}).`;
  } else {
    text = `There is a ${strength} ${direction} relationship (r = ${r.toFixed(3)}). As one value ${r>0?'increases, the other tends to increase too':'increases, the other tends to decrease'}.`;
  }
  return { strength, direction, text };
}

/* ---------------------------------------------------------------
   PLAIN-LANGUAGE SUMMARY: translate cleaning + analysis into prose
   that someone with no data background can follow.
----------------------------------------------------------------*/
function buildPlainSummary(result, pivotSnapshot, groupBySnapshot, correlationSnapshot){
  if(!result) return [];
  const { report, columnInfo, headers } = result;
  const points = [];

  // 1. What this dataset is, in plain terms
  const numCols = columnInfo.filter(c=>c.type==='number').length;
  const textCols = columnInfo.filter(c=>c.type==='text').length;
  const dateCols = columnInfo.filter(c=>c.type==='date').length;
  let colDesc = [];
  if(numCols) colDesc.push(`${numCols} numeric column${numCols>1?'s':''} (like amounts or counts)`);
  if(textCols) colDesc.push(`${textCols} category or text column${textCols>1?'s':''}`);
  if(dateCols) colDesc.push(`${dateCols} date column${dateCols>1?'s':''}`);
  points.push({
    heading: 'What this dataset contains',
    text: `This dataset has ${report.finalRowCount.toLocaleString()} record${report.finalRowCount===1?'':'s'} across ${headers.length} column${headers.length===1?'':'s'}${colDesc.length ? ': ' + colDesc.join(', ') + '.' : '.'}`
  });

  // 2. What was cleaned, in plain terms
  const cleaningBits = [];
  if(report.dupeRowsRemoved > 0) cleaningBits.push(`${report.dupeRowsRemoved} duplicate record${report.dupeRowsRemoved>1?'s were':' was'} removed`);
  if(report.emptyRowsRemoved > 0) cleaningBits.push(`${report.emptyRowsRemoved} completely empty row${report.emptyRowsRemoved>1?'s were':' was'} removed`);
  if(report.totalMissing > 0) cleaningBits.push(`${report.totalMissing} missing value${report.totalMissing>1?'s were':' was'} found and filled in with reasonable defaults`);
  if(report.trimmedCells > 0) cleaningBits.push(`extra spaces were cleaned up in ${report.trimmedCells} cell${report.trimmedCells>1?'s':''}`);
  points.push({
    heading: 'What was cleaned up',
    text: cleaningBits.length > 0
      ? `Before analysis, this data was tidied: ${cleaningBits.join(', ')}. The dataset started with ${report.originalRowCount.toLocaleString()} rows and now has ${report.finalRowCount.toLocaleString()} usable rows.`
      : `This dataset was already clean — no duplicates, missing values, or formatting issues were found.`
  });

  // 3. Outliers in plain terms
  const outlierCols = columnInfo.filter(c => c.outlierCount > 0);
  if(outlierCols.length > 0){
    const totalOutliers = outlierCols.reduce((s,c)=>s+c.outlierCount,0);
    points.push({
      heading: 'Unusual values',
      text: `${totalOutliers} value${totalOutliers>1?'s stand':' stands'} out as unusually high or low compared to the rest of the data, in column${outlierCols.length>1?'s':''}: ${outlierCols.map(c=>c.name).join(', ')}. These weren't removed, just flagged — they may be genuine extreme cases or data entry errors worth double-checking.`
    });
  }

  // 4. Pivot table in plain terms
  if(pivotSnapshot && pivotSnapshot.pivot && pivotSnapshot.pivot.grid.length > 0){
    const { rowField, colField, aggType, valueField, pivot } = pivotSnapshot;
    // find the row(s) with the highest total to highlight, accounting for ties
    let topVal = -Infinity;
    let topRows = [];
    pivot.grid.forEach(r => {
      const val = colField ? r.rowTotal : r.cells[0];
      if(typeof val !== 'number') return;
      if(val > topVal){ topVal = val; topRows = [r.rowKey]; }
      else if(val === topVal){ topRows.push(r.rowKey); }
    });
    const metricName = aggType === 'count' ? 'number of records' : `${aggType === 'sum' ? 'total' : 'average'} ${valueField}`;
    let text = colField
      ? `Looking at ${rowField} broken down by ${colField}, the ${metricName} varies across groups.`
      : `Looking at ${rowField}, the ${metricName} varies across groups.`;
    if(topRows.length === 1){
      text += ` "${topRows[0]}" has the highest ${metricName.includes('average') ? 'average' : 'total'}${aggType!=='count' ? ` (${formatNum(topVal)})` : ` (${topVal.toLocaleString()} records)`}.`;
    } else if(topRows.length > 1 && topRows.length < pivot.grid.length){
      text += ` ${topRows.map(r=>`"${r}"`).join(' and ')} are tied for the highest ${metricName.includes('average') ? 'average' : 'total'}${aggType!=='count' ? ` (${formatNum(topVal)})` : ` (${topVal.toLocaleString()} records)`}.`;
    }
    points.push({ heading: 'Pivot table takeaway', text });
  }

  // 5. Group-by in plain terms
  if(groupBySnapshot && groupBySnapshot.groups && groupBySnapshot.groups.length > 0){
    const { groupField, statField, groups, overallStats } = groupBySnapshot;
    const sorted = [...groups].sort((a,b)=>b.stats.mean - a.stats.mean);
    const highest = sorted[0], lowest = sorted[sorted.length-1];
    let text = `On average, ${statField} is highest for "${highest.group}" (${formatNum(highest.stats.mean)}) and lowest for "${lowest.group}" (${formatNum(lowest.stats.mean)}), grouped by ${groupField}.`;
    if(overallStats){
      text += ` Across the whole dataset, the average ${statField} is ${formatNum(overallStats.mean)}.`;
    }
    points.push({ heading: 'Group comparison takeaway', text });
  }

  // 6. Correlation in plain terms
  if(correlationSnapshot && correlationSnapshot.points && correlationSnapshot.points.length >= 2 && correlationSnapshot.r !== null){
    const { xField, yField, interpretation } = correlationSnapshot;
    points.push({
      heading: 'Relationship between columns',
      text: `Comparing ${xField} and ${yField}: ${interpretation.text} ${interpretation.strength === 'negligible' ? "In other words, knowing one value doesn't tell you much about the other." : "This is a pattern worth keeping in mind when interpreting the data."}`
    });
  }

  return points;
}

function CorrelationView({ rows, columnInfo, onStateChange }){
  const numericCols = columnInfo.filter(c => c.type === 'number');
  const [xField, setXField] = useState('');
  const [yField, setYField] = useState('');

  React.useEffect(() => {
    if(!xField && numericCols.length > 0) setXField(numericCols[0].name);
    if(!yField && numericCols.length > 1) setYField(numericCols[1].name);
  }, [columnInfo]);

  const points = React.useMemo(() => {
    if(!xField || !yField) return [];
    return rows
      .map(r => ({ x: r[xField], y: r[yField] }))
      .filter(p => typeof p.x === 'number' && !isNaN(p.x) && typeof p.y === 'number' && !isNaN(p.y));
  }, [rows, xField, yField]);

  const r = React.useMemo(() => pearsonCorrelation(points.map(p=>p.x), points.map(p=>p.y)), [points]);
  const interpretation = interpretCorrelation(r);

  // Linear regression for trend line: y = a + b*x
  const regression = React.useMemo(() => {
    if(points.length < 2) return null;
    const n = points.length;
    const meanX = points.reduce((s,p)=>s+p.x,0)/n;
    const meanY = points.reduce((s,p)=>s+p.y,0)/n;
    let num=0, den=0;
    points.forEach(p => { num += (p.x-meanX)*(p.y-meanY); den += (p.x-meanX)*(p.x-meanX); });
    if(den === 0) return null;
    const b = num/den;
    const a = meanY - b*meanX;
    return { a, b };
  }, [points]);

  React.useEffect(() => {
    if(onStateChange) onStateChange({ xField, yField, points, r, interpretation, regression });
  }, [points, xField, yField, r, regression]);

  if(numericCols.length < 2){
    return (
      <div className="empty-state">
        <div className="icon">⤬</div>
        <p>Correlation analysis needs at least two numeric columns in this dataset.</p>
      </div>
    );
  }

  // SVG scatter plot geometry
  const W = 680, H = 380, pad = 50;
  const xs = points.map(p=>p.x), ys = points.map(p=>p.y);
  const safeMin = (arr) => { let m = arr.length?arr[0]:0; for(let i=1;i<arr.length;i++) if(arr[i]<m) m=arr[i]; return m; };
  const safeMax = (arr) => { let m = arr.length?arr[0]:1; for(let i=1;i<arr.length;i++) if(arr[i]>m) m=arr[i]; return m; };
  const xMin = safeMin(xs), xMax = safeMax(xs);
  const yMin = safeMin(ys), yMax = safeMax(ys);
  const xRange = (xMax - xMin) || 1, yRange = (yMax - yMin) || 1;
  const sx = (v) => pad + ((v - xMin) / xRange) * (W - 2*pad);
  const sy = (v) => H - pad - ((v - yMin) / yRange) * (H - 2*pad);

  return (
    <div>
      <div className="corr-controls">
        <div className="pivot-field">
          <label>X axis</label>
          <select value={xField} onChange={e=>setXField(e.target.value)}>
            {numericCols.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
          </select>
        </div>
        <div className="pivot-field">
          <label>Y axis</label>
          <select value={yField} onChange={e=>setYField(e.target.value)}>
            {numericCols.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
          </select>
        </div>
      </div>

      {points.length < 2 ? (
        <div className="empty-state">
          <div className="icon">—</div>
          <p>Not enough overlapping numeric values between these two columns to compute a correlation.</p>
        </div>
      ) : (
        <React.Fragment>
          <div className="corr-stat-row">
            <div className="corr-stat">
              <div className="cs-label">Correlation (r)</div>
              <div className="cs-value">{r === null ? '—' : r.toFixed(3)}</div>
            </div>
            <div className="corr-stat">
              <div className="cs-label">Strength</div>
              <div className="cs-value" style={{fontSize:'16px',textTransform:'capitalize'}}>{interpretation.strength}</div>
            </div>
            <div className="corr-stat">
              <div className="cs-label">Data points</div>
              <div className="cs-value">{points.length}</div>
            </div>
          </div>

          <div className="corr-interpretation">{interpretation.text}</div>

          <svg className="scatter-svg" viewBox={`0 0 ${W} ${H}`}>
            <line className="axis-line" x1={pad} y1={H-pad} x2={W-pad} y2={H-pad} />
            <line className="axis-line" x1={pad} y1={pad} x2={pad} y2={H-pad} />
            <text className="axis-label" x={W/2} y={H-12} textAnchor="middle">{xField}</text>
            <text className="axis-label" x={14} y={H/2} textAnchor="middle" transform={`rotate(-90 14 ${H/2})`}>{yField}</text>
            <text className="axis-label" x={pad} y={H-pad+16}>{formatNum(xMin)}</text>
            <text className="axis-label" x={W-pad} y={H-pad+16} textAnchor="end">{formatNum(xMax)}</text>
            <text className="axis-label" x={pad-6} y={H-pad} textAnchor="end">{formatNum(yMin)}</text>
            <text className="axis-label" x={pad-6} y={pad+4} textAnchor="end">{formatNum(yMax)}</text>

            {regression && (
              <line className="trend-line"
                x1={sx(xMin)} y1={sy(regression.a + regression.b*xMin)}
                x2={sx(xMax)} y2={sy(regression.a + regression.b*xMax)} />
            )}

            {points.map((p,i) => (
              <circle key={i} className="point" cx={sx(p.x)} cy={sy(p.y)} r="4" />
            ))}
          </svg>
          <p className="hint" style={{marginTop:'10px'}}>Dashed line shows the linear trend. Correlation measures linear relationship only — it won't catch curved or non-linear patterns.</p>
        </React.Fragment>
      )}
    </div>
  );
}

   PDF REPORT: offscreen template + generator
----------------------------------------------------------------*/
const PDF_SECTION_OPTIONS = [
  { key:'plainSummary', label:'Plain-Language Summary', desc:'Key takeaways written in everyday language, no stats background needed' },
  { key:'summary', label:'Summary', desc:'Row/column counts, duplicates removed, missing values' },
  { key:'columnOverview', label:'Column Overview', desc:'Per-column type, unique values, missing, outliers' },

  { key:'pivot', label:'Pivot Table', desc:'Your current cross-tabulation selection' },
  { key:'groupBy', label:'Group-by Summary', desc:'Your current group-by statistics selection' },
  { key:'correlation', label:'Correlation & Scatter Plot', desc:'Your current correlation selection' },
  { key:'hypothesis', label:'Hypothesis Testing', desc:'T-test and chi-square results with plain-English significance verdict' },

/* ---------------------------------------------------------------
   ANALYZE: Hypothesis testing (t-test + chi-square)
----------------------------------------------------------------*/
function HypothesisTesting({ rows, columnInfo }){
  const numericCols = columnInfo.filter(c => c.type === 'number');
  const categoricalCols = columnInfo.filter(c => c.type === 'text' || c.type === 'boolean');

  const [testType, setTestType] = useState('ttest'); // 'ttest' | 'chi2'
  const [numCol, setNumCol] = useState('');
  const [groupCol, setGroupCol] = useState('');
  const [catColA, setCatColA] = useState('');
  const [catColB, setCatColB] = useState('');

  React.useEffect(()=>{
    if(!numCol && numericCols.length > 0) setNumCol(numericCols[0].name);
    if(!groupCol && categoricalCols.length > 0) setGroupCol(categoricalCols[0].name);
    if(!catColA && categoricalCols.length > 0) setCatColA(categoricalCols[0].name);
    if(!catColB && categoricalCols.length > 1) setCatColB(categoricalCols[1].name);
  }, [columnInfo]);

  const tResult = React.useMemo(()=>{
    if(testType !== 'ttest' || !numCol || !groupCol) return null;
    const groups = {};
    rows.forEach(r => {
      const g = r[groupCol] === null || r[groupCol] === undefined || r[groupCol] === '' ? '(blank)' : String(r[groupCol]);
      const v = r[numCol];
      if(typeof v === 'number' && !isNaN(v)){
        if(!groups[g]) groups[g] = [];
        groups[g].push(v);
      }
    });
    const keys = Object.keys(groups).filter(k => groups[k].length >= 2);
    if(keys.length < 2) return { error: `Need at least 2 groups with 2+ values each. Found: ${Object.keys(groups).map(k=>`"${k}" (n=${groups[k]?.length||0})`).join(', ')}.` };
    if(keys.length > 2) return { warning: keys, groups };
    return { groups, keys, result: welchTTest(groups[keys[0]], groups[keys[1]]), keyA: keys[0], keyB: keys[1] };
  }, [rows, numCol, groupCol, testType]);

  const chi2Result = React.useMemo(()=>{
    if(testType !== 'chi2' || !catColA || !catColB || catColA === catColB) return null;
    const res = chiSquareTest(rows, catColA, catColB);
    if(!res) return { error: 'Could not compute chi-square. Make sure both columns have at least 2 unique values.' };
    return res;
  }, [rows, catColA, catColB, testType]);

  const ALPHA = 0.05;

  const renderTResult = () => {
    if(!tResult) return null;
    if(tResult.error) return <div className="err-msg">{tResult.error}</div>;
    if(tResult.warning){
      return (
        <div>
          <p className="hint">More than 2 groups found ({tResult.warning.map(k=>`"${k}"`).join(', ')}). T-test compares exactly 2 groups. Select a column with only 2 distinct values, or use the first two groups below:</p>
          {tResult.warning.slice(0,2).map((k,i) => (
            <p key={i} className="hint"><strong>{k}</strong>: n={tResult.groups[k].length}, mean={formatNum(tResult.groups[k].reduce((s,v)=>s+v,0)/tResult.groups[k].length)}</p>
          ))}
        </div>
      );
    }
    const { result, keyA, keyB } = tResult;
    if(!result) return <div className="err-msg">Could not compute t-test — one or both groups may have zero variance.</div>;
    const sig = result.p < ALPHA;
    return (
      <div className={`hyp-result ${sig ? 'significant' : 'not-significant'}`}>
        <div className={`hyp-verdict ${sig ? 'sig' : 'not-sig'}`}>{sig ? '✓ Significant difference found' : '— No significant difference found'}</div>
        <div className="hyp-plain">
          {sig
            ? `The average ${numCol} for "${keyA}" (${formatNum(result.meanA)}) is significantly ${result.meanA > result.meanB ? 'higher' : 'lower'} than for "${keyB}" (${formatNum(result.meanB)}). This difference is unlikely to be due to chance (p = ${result.p.toFixed(4)}).`
            : `The average ${numCol} for "${keyA}" (${formatNum(result.meanA)}) and "${keyB}" (${formatNum(result.meanB)}) are not significantly different. The gap could plausibly be due to random variation (p = ${result.p.toFixed(4)}).`
          }
        </div>
        <div className="hyp-stats">
          <div className="hyp-stat"><div className="hs-label">Mean ({keyA})</div><div className="hs-value">{formatNum(result.meanA)}</div></div>
          <div className="hyp-stat"><div className="hs-label">Mean ({keyB})</div><div className="hs-value">{formatNum(result.meanB)}</div></div>
          <div className="hyp-stat"><div className="hs-label">t-statistic</div><div className="hs-value">{result.t.toFixed(3)}</div></div>
          <div className="hyp-stat"><div className="hs-label">Degrees of freedom</div><div className="hs-value">{result.df.toFixed(1)}</div></div>
          <div className="hyp-stat"><div className="hs-label">p-value</div><div className="hs-value" style={{color: sig ? 'var(--c-teal)' : 'var(--ink-soft)'}}>{result.p.toFixed(4)}</div></div>
          <div className="hyp-stat"><div className="hs-label">n ({keyA})</div><div className="hs-value">{result.nA}</div></div>
          <div className="hyp-stat"><div className="hs-label">n ({keyB})</div><div className="hs-value">{result.nB}</div></div>
        </div>
        <div className="hyp-note">Using Welch's t-test (unequal variances). Significance threshold: p &lt; {ALPHA}. A significant result means the observed difference is statistically unlikely by chance — it does not necessarily indicate practical importance.</div>
      </div>
    );
  };

  const renderChi2Result = () => {
    if(!chi2Result) return null;
    if(chi2Result.error) return <div className="err-msg">{chi2Result.error}</div>;
    const sig = chi2Result.p < ALPHA;
    return (
      <div className={`hyp-result ${sig ? 'significant' : 'not-significant'}`}>
        <div className={`hyp-verdict ${sig ? 'sig' : 'not-sig'}`}>{sig ? '✓ Association found' : '— No association found'}</div>
        <div className="hyp-plain">
          {sig
            ? `"${catColA}" and "${catColB}" appear to be related — knowing the value of one tells you something about the other (p = ${chi2Result.p.toFixed(4)}).`
            : `"${catColA}" and "${catColB}" appear to be independent — the distribution of one doesn't seem to depend on the other (p = ${chi2Result.p.toFixed(4)}).`
          }
        </div>
        <div className="hyp-stats">
          <div className="hyp-stat"><div className="hs-label">χ² statistic</div><div className="hs-value">{chi2Result.chi2.toFixed(3)}</div></div>
          <div className="hyp-stat"><div className="hs-label">Degrees of freedom</div><div className="hs-value">{chi2Result.df}</div></div>
          <div className="hyp-stat"><div className="hs-label">p-value</div><div className="hs-value" style={{color: sig ? 'var(--c-teal)' : 'var(--ink-soft)'}}>{chi2Result.p.toFixed(4)}</div></div>
          <div className="hyp-stat"><div className="hs-label">Total rows</div><div className="hs-value">{chi2Result.grand}</div></div>
          <div className="hyp-stat"><div className="hs-label">Categories ({catColA})</div><div className="hs-value">{chi2Result.rowKeys.length}</div></div>
          <div className="hyp-stat"><div className="hs-label">Categories ({catColB})</div><div className="hs-value">{chi2Result.colKeys.length}</div></div>
        </div>
        <div className="hyp-note">Using Pearson's chi-square test of independence. Significance threshold: p &lt; {ALPHA}. Results may be unreliable if many expected cell counts are below 5.</div>
      </div>
    );
  };

  if(numericCols.length === 0 && categoricalCols.length < 2){
    return (
      <div className="empty-state">
        <div className="icon">H₀</div>
        <p>Hypothesis testing needs either a numeric column + a categorical group column (for t-test), or two categorical columns (for chi-square).</p>
      </div>
    );
  }

  return (
    <div>
      <div className="hyp-controls">
        <div className="pivot-field">
          <label>Test type</label>
          <select value={testType} onChange={e=>setTestType(e.target.value)}>
            <option value="ttest">T-test — compare means between 2 groups</option>
            <option value="chi2">Chi-square — test association between 2 categories</option>
          </select>
        </div>
        {testType === 'ttest' && (
          <React.Fragment>
            <div className="pivot-field">
              <label>Numeric column</label>
              <select value={numCol} onChange={e=>setNumCol(e.target.value)}>
                {numericCols.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}
              </select>
            </div>
            <div className="pivot-field">
              <label>Group column</label>
              <select value={groupCol} onChange={e=>setGroupCol(e.target.value)}>
                {categoricalCols.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}
              </select>
            </div>
          </React.Fragment>
        )}
        {testType === 'chi2' && (
          <React.Fragment>
            <div className="pivot-field">
              <label>First category</label>
              <select value={catColA} onChange={e=>setCatColA(e.target.value)}>
                {categoricalCols.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}
              </select>
            </div>
            <div className="pivot-field">
              <label>Second category</label>
              <select value={catColB} onChange={e=>setCatColB(e.target.value)}>
                {categoricalCols.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}
              </select>
            </div>
          </React.Fragment>
        )}
      </div>
      {testType === 'ttest' ? renderTResult() : renderChi2Result()}
      <p className="hint" style={{marginTop:'12px'}}>
        {testType === 'ttest'
          ? 'T-test asks: is the difference in averages between two groups real, or could it just be random variation?'
          : 'Chi-square asks: are these two categorical variables related, or independent of each other?'}
      </p>
    </div>
  );
}

function PlainSummaryView({ result, pivotSnapshot, groupBySnapshot, correlationSnapshot }){
  const points = React.useMemo(
    () => buildPlainSummary(result, pivotSnapshot, groupBySnapshot, correlationSnapshot),
    [result, pivotSnapshot, groupBySnapshot, correlationSnapshot]
  );

  if(points.length === 0){
    return <div className="empty-state"><div className="icon">—</div><p>Nothing to summarize yet.</p></div>;
  }

  return (
    <div className="plain-summary">
      {points.map((p, i) => (
        <div className="plain-card" key={i}>
          <div className="pc-heading">{p.heading}</div>
          <div className="pc-text">{p.text}</div>
        </div>
      ))}
      <p className="hint">This summary updates automatically as you build pivot tables, group-by comparisons, and correlations below.</p>
    </div>
  );
}

        <h3>Download PDF Report</h3>
        <p className="pp-sub">Choose what to include. Unchecked sections are left out entirely.</p>
        {PDF_SECTION_OPTIONS.map(opt => (
          <label className="pdf-picker-option" key={opt.key}>
            <input type="checkbox" checked={!!sections[opt.key]} onChange={()=>toggle(opt.key)} />
            <div>
              <div className="pp-label">{opt.label}</div>
              <div className="pp-desc">{opt.desc}</div>
            </div>
          </label>
        ))}
        <div className="pdf-picker-actions">
          <button className="btn-sm" onClick={onCancel}>Cancel</button>
          <button className="btn-sm primary" disabled={!anySelected} onClick={()=>onConfirm(sections)}>Generate PDF</button>
        </div>
      </div>
    </div>
  );
}

      {showCorrelationPage && (

          <div className="pdf-kpi-row">
            <div className="pdf-kpi">
              <div className="k-label">Correlation (r)</div>
              <div className="k-value">{correlationSnapshot.r === null ? '—' : correlationSnapshot.r.toFixed(3)}</div>
            </div>
            <div className="pdf-kpi">
              <div className="k-label">Strength</div>
              <div className="k-value" style={{fontSize:'15px',textTransform:'capitalize'}}>{correlationSnapshot.interpretation.strength}</div>
            </div>
            <div className="pdf-kpi">
              <div className="k-label">Data points</div>
              <div className="k-value">{correlationSnapshot.points.length}</div>
            </div>
          </div>
          <p style={{fontSize:'12px',background:'#f0f7f5',border:'1px solid #b8ddd2',borderRadius:'8px',padding:'10px 14px',marginBottom:'16px'}}>{correlationSnapshot.interpretation.text}</p>

          <svg viewBox="0 0 680 380" width="680" height="380" style={{background:'#fafafa',border:'1px solid #ddd',borderRadius:'8px'}}>
            {(() => {
              const pts = correlationSnapshot.points;
              const reg = correlationSnapshot.regression;
              const W=680,H=380,pad=50;
              const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
              const safeMin=(a)=>{let m=a.length?a[0]:0;for(let i=1;i<a.length;i++)if(a[i]<m)m=a[i];return m;};
              const safeMax=(a)=>{let m=a.length?a[0]:1;for(let i=1;i<a.length;i++)if(a[i]>m)m=a[i];return m;};
              const xMin=safeMin(xs),xMax=safeMax(xs),yMin=safeMin(ys),yMax=safeMax(ys);
              const xRange=(xMax-xMin)||1, yRange=(yMax-yMin)||1;
              const sx=(v)=>pad+((v-xMin)/xRange)*(W-2*pad);
              const sy=(v)=>H-pad-((v-yMin)/yRange)*(H-2*pad);
              return (
                <React.Fragment>
                  <line x1={pad} y1={H-pad} x2={W-pad} y2={H-pad} stroke="#ccc" />
                  <line x1={pad} y1={pad} x2={pad} y2={H-pad} stroke="#ccc" />
                  <text x={W/2} y={H-12} textAnchor="middle" fontSize="11" fill="#666">{correlationSnapshot.xField}</text>
                  <text x={14} y={H/2} textAnchor="middle" fontSize="11" fill="#666" transform={`rotate(-90 14 ${H/2})`}>{correlationSnapshot.yField}</text>
                  {reg && <line x1={sx(xMin)} y1={sy(reg.a+reg.b*xMin)} x2={sx(xMax)} y2={sy(reg.a+reg.b*xMax)} stroke="#e8743b" strokeWidth="2" strokeDasharray="4 3" />}
                  {pts.map((p,i) => <circle key={i} cx={sx(p.x)} cy={sy(p.y)} r="3.5" fill="#2563eb" opacity="0.6" />)}
                </React.Fragment>
              );
            })()}
          </svg>

          <div className="pdf-footer">Tidy &mdash; Data Cleaning &amp; Analysis Workbench</div>
        </div>
      )}
    </div>
  );
}

async function generatePdfReport(fileLabel){
  const root = document.getElementById('pdf-report-root');
  if(!root) throw new Error('Report template not ready');
  const pages = Array.from(root.querySelectorAll('.pdf-page'));
  if(pages.length === 0) throw new Error('Select at least one section to include in the report.');

  const A4_WIDTH_PT = 595.28;
  const A4_HEIGHT_PT = 841.89;
  let pdf = null;

  for(let i=0;i<pages.length;i++){
    const canvas = await window.html2canvas(pages[i], { scale: 1.5, backgroundColor: '#ffffff', useCORS: true });
    const imgData = canvas.toDataURL('image/jpeg', 0.85);
    const imgWidthPt = A4_WIDTH_PT;
    const imgHeightPt = (canvas.height * imgWidthPt) / canvas.width;

    if(imgHeightPt <= A4_HEIGHT_PT){
      // Content fits on a single page — size the PDF page to the content,
      // so short sections (like a pivot table) don't leave blank space below.
      // Pass explicit orientation so jsPDF doesn't auto-swap width/height
      // when the content is wider than it is tall.
      const orientation = imgWidthPt > imgHeightPt ? 'l' : 'p';
      if(!pdf){
        pdf = new window.jspdf.jsPDF({ unit:'pt', format:[imgWidthPt, imgHeightPt], orientation });
      } else {
        pdf.addPage([imgWidthPt, imgHeightPt], orientation);
      }
      pdf.addImage(imgData, 'JPEG', 0, 0, imgWidthPt, imgHeightPt);
    } else {
      // Content is taller than one A4 page — paginate normally across
      // standard A4-sized pages.
      if(!pdf){
        pdf = new window.jspdf.jsPDF({ unit:'pt', format:'a4' });
      } else {
        pdf.addPage('a4');
      }
      let heightLeft = imgHeightPt;
      let position = 0;
      pdf.addImage(imgData, 'JPEG', 0, position, imgWidthPt, imgHeightPt);
      heightLeft -= A4_HEIGHT_PT;
      while(heightLeft > 0){
        position = heightLeft - imgHeightPt;
        pdf.addPage('a4');
        pdf.addImage(imgData, 'JPEG', 0, position, imgWidthPt, imgHeightPt);
        heightLeft -= A4_HEIGHT_PT;
      }
    }
  }

  const safeName = (fileLabel || 'tidy_report').replace(/\.[^/.]+$/, '').replace(/[^a-z0-9_\-]/gi, '_');
  pdf.save(`${safeName}_report.pdf`);
}

   HISTORY MODULE
----------------------------------------------------------------*/
function HistoryModule({ user, onReload }){
  const [entries, setEntries] = useState(() => loadHistory(user));
  const [confirmClear, setConfirmClear] = useState(false);
  const [search, setSearch] = useState('');
  const [selectedIds, setSelectedIds] = useState([]);
  const [compareView, setCompareView] = useState(null); // { a, b } entry objects
  const usedKB = estimateStorageUsedKB(user);
  const usedPct = Math.min(100, Math.round(usedKB / (HISTORY_MAX_DATA_BYTES * HISTORY_MAX_ENTRIES / 1024) * 100));

  const refresh = () => setEntries(loadHistory(user));

  const handleDelete = (id) => {
    deleteHistoryEntry(user, id);
    setSelectedIds(s => s.filter(x => x !== id));
    if(compareView && (compareView.a.id===id || compareView.b.id===id)) setCompareView(null);
    refresh();
  };

  const handleClear = () => {
    clearHistory(user);
    setConfirmClear(false);
    setSelectedIds([]);
    setCompareView(null);
    refresh();
  };

  const handleReload = (entry) => {
    if(!entry.dataStr){
      alert('This entry was saved without data (file was too large). Re-upload the original file to analyse it again.');
      return;
    }
    const parsed = deserializeHistoryData(entry.dataStr);
    if(!parsed){ alert('Could not reload this entry — data may be corrupted.'); return; }
    onReload(parsed.rows, parsed.headers, entry.fileName);
  };

  const toggleSelect = (id) => {
    setCompareView(null);
    setSelectedIds(prev => {
      if(prev.includes(id)) return prev.filter(x => x !== id);
      if(prev.length >= 2) return prev;
      return [...prev, id];
    });
  };

  const handleCompare = () => {
    if(selectedIds.length !== 2) return;
    const a = entries.find(e => e.id === selectedIds[0]);
    const b = entries.find(e => e.id === selectedIds[1]);
    setCompareView({ a, b });
  };

  const handleExportLog = () => {
    const headers = ['File name','Date','Final rows','Columns','Duplicates removed','Missing values','Data saved'];
    const rows = entries.map(e => ({
      'File name': e.fileName,
      'Date': new Date(e.savedAt).toLocaleString(),
      'Final rows': e.finalRows || 0,
      'Columns': e.columns || 0,
      'Duplicates removed': e.dupeRowsRemoved || 0,
      'Missing values': e.totalMissing || 0,
      'Data saved': e.dataStr ? 'Yes' : 'No',
    }));
    downloadCSV(rows, headers, 'tidy_history_log');
  };

  const filtered = search.trim()
    ? entries.filter(e => e.fileName.toLowerCase().includes(search.trim().toLowerCase()))
    : entries;

  const storageBarClass = usedPct > 85 ? 'danger' : usedPct > 60 ? 'warn' : '';

  if(compareView){
    const { a, b } = compareView;
    const allCols = new Set([...(a.columnNames||[]), ...(b.columnNames||[])]);
    return (
      <div className="history-wrap">
        <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px'}}>
          <button className="btn-sm" onClick={()=>setCompareView(null)}>&larr; Back to history</button>
          <p className="section-label" style={{margin:0}}>Comparing two datasets</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'20px'}}>
          {[a,b].map((e,i) => (
            <div key={i} className="history-card" style={{borderColor: i===0?'var(--c-teal)':'var(--c-coral)'}}>
              <div className="hc-icon">📊</div>
              <div className="hc-title">{e.fileName}</div>
              <div className="hc-date">{new Date(e.savedAt).toLocaleString()}</div>
              <div className="hc-pills" style={{marginTop:'8px'}}>
                <span className="history-pill">{(e.finalRows||0).toLocaleString()} rows</span>
                <span className="history-pill">{e.columns||0} cols</span>
                {e.dupeRowsRemoved>0 && <span className="history-pill warn">{e.dupeRowsRemoved} dupes</span>}
                {e.totalMissing>0 && <span className="history-pill warn">{e.totalMissing} missing</span>}
              </div>
            </div>
          ))}
        </div>
        <p className="section-label">Row &amp; column comparison</p>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px',marginBottom:'20px'}}>
          <thead>
            <tr>
              {['Metric', a.fileName, b.fileName, 'Difference'].map(h => (
                <th key={h} style={{textAlign:'left',padding:'8px 12px',borderBottom:'1px solid var(--line)',fontFamily:'var(--mono)',fontSize:'10px',textTransform:'uppercase',color:'var(--ink-soft)'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[
              ['Rows', a.finalRows||0, b.finalRows||0],
              ['Columns', a.columns||0, b.columns||0],
              ['Duplicates removed', a.dupeRowsRemoved||0, b.dupeRowsRemoved||0],
              ['Missing values', a.totalMissing||0, b.totalMissing||0],
            ].map(([label,va,vb]) => {
              const diff = vb - va;
              const diffStr = diff===0 ? 'Same' : (diff>0?'+':'')+diff.toLocaleString();
              const diffColor = diff===0?'var(--ink-soft)':label==='Rows'||label==='Columns'?(diff>0?'var(--c-teal)':'var(--c-coral)'):(diff>0?'var(--c-coral)':'var(--c-teal)');
              return (
                <tr key={label}>
                  <td style={{padding:'8px 12px',borderBottom:'1px solid var(--line)',fontWeight:600}}>{label}</td>
                  <td style={{padding:'8px 12px',borderBottom:'1px solid var(--line)',color:'var(--c-teal)'}}>{va.toLocaleString()}</td>
                  <td style={{padding:'8px 12px',borderBottom:'1px solid var(--line)',color:'var(--c-coral)'}}>{vb.toLocaleString()}</td>
                  <td style={{padding:'8px 12px',borderBottom:'1px solid var(--line)',color:diffColor,fontWeight:600}}>{diffStr}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {allCols.size > 0 && (
          <React.Fragment>
            <p className="section-label">Column presence</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
              {Array.from(allCols).sort().map(col => {
                const inA = (a.columnNames||[]).includes(col);
                const inB = (b.columnNames||[]).includes(col);
                const color = inA&&inB ? 'var(--c-teal)' : 'var(--c-amber)';
                const label = inA&&inB ? 'Both' : inA ? a.fileName.slice(0,12)+'…' : b.fileName.slice(0,12)+'…';
                return (
                  <span key={col} style={{fontSize:'11px',padding:'4px 10px',borderRadius:'20px',border:`1px solid ${color}`,color,fontFamily:'var(--mono)'}} title={label}>
                    {col}
                  </span>
                );
              })}
            </div>
            <p className="hint" style={{marginTop:'10px'}}>
              {Array.from(allCols).filter(c=>!(a.columnNames||[]).includes(c)||(!(b.columnNames||[]).includes(c))).length} column{Array.from(allCols).filter(c=>!(a.columnNames||[]).includes(c)||(!(b.columnNames||[]).includes(c))).length===1?'':'s'} differ between the two datasets (shown in amber).
            </p>
          </React.Fragment>
        )}
      </div>
    );
  }

  return (
    <div className="history-wrap">
      <div style={{display:'flex',alignItems:'center',marginBottom:'16px',gap:'12px',flexWrap:'wrap'}}>
        <p className="section-label" style={{margin:0}}>Analysis history</p>
        <div style={{flex:1}}/>
        {entries.length > 0 && (
          <React.Fragment>
            <button className="btn-sm" onClick={handleExportLog}>Export log CSV</button>
            {confirmClear
              ? <React.Fragment>
                  <span style={{fontSize:'12px',color:'var(--ink-soft)'}}>Delete all {entries.length} entries?</span>
                  <button className="btn-sm" style={{color:'var(--warn)',borderColor:'var(--warn)'}} onClick={handleClear}>Yes, clear all</button>
                  <button className="btn-sm" onClick={()=>setConfirmClear(false)}>Cancel</button>
                </React.Fragment>
              : <button className="btn-sm" onClick={()=>setConfirmClear(true)}>Clear all</button>
            }
          </React.Fragment>
        )}
      </div>

      {selectedIds.length > 0 && (
        <div style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',background:'var(--c-amber-soft)',border:'1px solid var(--c-amber)',borderRadius:'8px',marginBottom:'14px',fontSize:'13px'}}>
          <span>{selectedIds.length === 1 ? 'Select one more to compare' : '2 datasets selected'}</span>
          <div style={{flex:1}}/>
          {selectedIds.length === 2 && <button className="btn-sm primary" onClick={handleCompare}>Compare side-by-side →</button>}
          <button className="btn-sm" onClick={()=>setSelectedIds([])}>Cancel</button>
        </div>
      )}

      {entries.length > 0 && (
        <div className="history-storage-bar">
          <span>Storage: {usedKB} KB</span>
          <div className="history-storage-track">
            <div className={`history-storage-fill ${storageBarClass}`} style={{width:usedPct+'%'}}/>
          </div>
          <span>{entries.length}/{HISTORY_MAX_ENTRIES} entries</span>
        </div>
      )}

      {entries.length > 1 && (
        <input
          type="text"
          placeholder="Search by filename…"
          value={search}
          onChange={e=>setSearch(e.target.value)}
          style={{width:'100%',marginBottom:'16px',background:'var(--panel)',border:'1px solid var(--line)',color:'var(--ink)',borderRadius:'6px',padding:'9px 12px',fontSize:'13px',boxSizing:'border-box'}}
        />
      )}

      {entries.length === 0 ? (
        <div className="history-empty">
          <div className="icon">🕐</div>
          <h2>No history yet</h2>
          <p>Each dataset you upload and clean will be saved here automatically. You can revisit and reload past analyses without re-uploading the original file.</p>
        </div>
      ) : filtered.length === 0 ? (
        <div className="history-empty">
          <div className="icon">—</div>
          <p>No datasets match "{search}".</p>
        </div>
      ) : (
        <div className="history-list">
          {filtered.map(entry => {
            const isSelected = selectedIds.includes(entry.id);
            return (
              <div className={`history-card${isSelected?' selected':''}`} key={entry.id}>
                <div className="hc-top">
                  <span className="hc-icon">📊</span>

// Build a compact dataset summary to send to Claude (never full data)
function buildDataSummary(result, maxRows = 50){
  const { cleanedRows, headers, columnInfo, report } = result;
  const sample = cleanedRows.slice(0, maxRows);
  return {
    rowCount: cleanedRows.length,
    columnCount: headers.length,
    columns: columnInfo.map(c => ({
      name: c.name,
      type: c.type,
      missing: c.missingCount,
      unique: c.uniqueCount,
      ...(c.stats ? { mean: c.stats.mean, min: c.stats.min, max: c.stats.max, median: c.stats.median } : {}),
      ...(c.distribution?.categories ? { topCategories: c.distribution.categories.slice(0,5).map(x=>x.label) } : {}),
    })),
    cleaningReport: {
      dupesRemoved: report.dupeRowsRemoved,
      emptyRowsRemoved: report.emptyRowsRemoved,
      totalMissing: report.totalMissing,
    },
    sampleRows: sample.slice(0, 10), // only first 10 rows to keep prompt small
  };
}

async function callClaude(prompt, maxTokens = 1000){
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }],
    })
  });
  if(!response.ok){
    const err = await response.json().catch(()=>({}));
    throw new Error(err?.error?.message || `API error ${response.status}`);
  }
  const data = await response.json();
  return data.content?.[0]?.text || '';
}

function AICleaning({ result }){
  const [status, setStatus] = useState('idle'); // idle | loading | done | error
  const [suggestions, setSuggestions] = useState([]);
  const [errorMsg, setErrorMsg] = useState('');

  const run = async () => {
    setStatus('loading');
    setSuggestions([]);
    setErrorMsg('');
    try {
      const summary = buildDataSummary(result);
      const prompt = `You are a data quality expert. Analyze this dataset summary and identify specific data quality issues, cleaning suggestions, and potential problems that a rule-based cleaner would miss.

Dataset summary:
${JSON.stringify(summary, null, 2)}

Return ONLY a JSON array (no markdown, no explanation outside the JSON) of up to 8 suggestions. Each item must have:
- "type": one of "type_issue", "semantic_duplicate", "suspicious_value", "missing_value_pattern", "format_inconsistency", "outlier_context"
- "column": column name (or "general" if not column-specific)
- "text": a specific, actionable observation in 1-2 sentences

Example format:
[{"type":"format_inconsistency","column":"date","text":"The date column has mixed formats — some values appear as DD/MM/YYYY and others as YYYY-MM-DD which may cause parsing errors."}]`;

      const raw = await callClaude(prompt, 800);
      const cleaned = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);
      setSuggestions(Array.isArray(parsed) ? parsed : []);
      setStatus('done');
    } catch(e) {
      setErrorMsg(e.message);
      setStatus('error');
    }
  };

  const typeLabel = {
    type_issue: 'Type issue',
    semantic_duplicate: 'Semantic duplicate',
    suspicious_value: 'Suspicious value',
    missing_value_pattern: 'Missing value pattern',
    format_inconsistency: 'Format inconsistency',
    outlier_context: 'Contextual outlier',
  };

  return (
    <div className="ai-section">
      <div className="ai-header">
        <span className="ai-badge">✦ AI</span>
        <span className="ai-title">AI Data Cleaning Suggestions</span>
        {status !== 'loading' && (
          <button className="btn-sm primary ai-run-btn" onClick={run}>
            {status === 'idle' ? 'Run AI analysis' : '↺ Re-run'}
          </button>
        )}
      </div>
      <div className="ai-body">
        {status === 'idle' && (
          <p className="hint">Click "Run AI analysis" to get context-aware cleaning suggestions beyond what the rule-based cleaner can detect — things like semantic duplicates, format inconsistencies, and suspicious values.</p>
        )}
        {status === 'loading' && (
          <div className="ai-loading">
            <div className="spinner" />
            Analysing your dataset with Claude...
          </div>
        )}
        {status === 'error' && (
          <div className="ai-error">Could not get suggestions: {errorMsg}</div>
        )}
        {status === 'done' && suggestions.length === 0 && (
          <p className="hint">No additional issues found — your dataset looks clean.</p>
        )}
        {suggestions.map((s, i) => (
          <div className="ai-suggestion" key={i}>
            <div className="as-type">{typeLabel[s.type] || s.type} {s.column && s.column !== 'general' ? <span>— <span className="as-col">{s.column}</span></span> : ''}</div>
            <div className="as-text">{s.text}</div>
          </div>
        ))}
        {status === 'done' && (
          <p className="ai-disclaimer">AI suggestions are based on a sample of your data. Always verify before making changes. Data is sent to Claude API — do not use with sensitive personal data.</p>
        )}
      </div>
    </div>
  );
}

function AIInsights({ result }){
  const [status, setStatus] = useState('idle');
  const [insights, setInsights] = useState([]);
  const [overview, setOverview] = useState('');
  const [errorMsg, setErrorMsg] = useState('');

  const run = async () => {
    setStatus('loading');
    setInsights([]);
    setOverview('');
    setErrorMsg('');
    try {
      const summary = buildDataSummary(result);
      const prompt = `You are a data analyst. Analyze this dataset summary and generate useful, specific insights.

Dataset summary:
${JSON.stringify(summary, null, 2)}

Return ONLY a JSON object (no markdown) with:
- "overview": 2-3 sentence plain-language description of what this dataset appears to be and its overall quality
- "insights": array of up to 8 insight objects, each with:
  - "type": one of "pattern", "anomaly", "recommendation"
  - "text": specific, concrete insight in 1-2 sentences — name actual columns and values where possible

Example:
{"overview":"This dataset contains 500 sales records across 6 columns...","insights":[{"type":"pattern","text":"The region column is dominated by 'North' (62%) suggesting a geographic skew in the data."}]}`;

      const raw = await callClaude(prompt, 1000);
      const cleaned = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);
      setOverview(parsed.overview || '');
      setInsights(Array.isArray(parsed.insights) ? parsed.insights : []);
      setStatus('done');
    } catch(e) {
      setErrorMsg(e.message);
      setStatus('error');
    }
  };

  return (
    <div className="ai-section">
      <div className="ai-header">
        <span className="ai-badge">✦ AI</span>
        <span className="ai-title">AI Dataset Insights</span>
        {status !== 'loading' && (
          <button className="btn-sm primary ai-run-btn" onClick={run}>
            {status === 'idle' ? 'Generate insights' : '↺ Regenerate'}
          </button>
        )}
      </div>
      <div className="ai-body">
        {status === 'idle' && (
          <p className="hint">Click "Generate insights" to get AI-powered observations about your dataset — patterns, anomalies, and recommendations written in plain language.</p>
        )}
        {status === 'loading' && (
          <div className="ai-loading">
            <div className="spinner" />
            Generating insights with Claude...
          </div>
        )}
        {status === 'error' && (
          <div className="ai-error">Could not generate insights: {errorMsg}</div>
        )}
        {status === 'done' && overview && (
          <div style={{marginBottom:'16px',padding:'14px 16px',background:'var(--panel)',border:'1px solid var(--line)',borderRadius:'8px',fontSize:'13px',lineHeight:'1.6'}}>
            {overview}
          </div>
        )}
        {insights.map((ins, i) => (
          <div className={`ai-insight ${ins.type}`} key={i}>
            <div className="ai-insight-label">{ins.type === 'pattern' ? '📈 Pattern' : ins.type === 'anomaly' ? '⚠️ Anomaly' : '💡 Recommendation'}</div>
            <div className="ai-insight-text">{ins.text}</div>
          </div>
        ))}
        {status === 'done' && (
          <p className="ai-disclaimer">Insights are generated from a sample of up to 50 rows and dataset statistics. Data is sent to Claude API — do not use with sensitive personal data.</p>
        )}
      </div>
    </div>
  );
}
