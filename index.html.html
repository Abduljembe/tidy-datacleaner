                    </div>
                  ))}
                </div>

                <p className="section-label">Step 3 — Column insights</p>
                <div className="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>Column</th>
                        <th>Type</th>
                        <th>Unique values</th>
                        <th>Missing (cleaned)</th>
                        <th>Fill applied</th>
                        <th>Outliers</th>
                      </tr>
                    </thead>
                    <tbody>
                      {result.columnInfo.map((col, i) => (
                        <tr key={i}>
                          <td>{col.name}</td>
                          <td>
                            <select
                              className={"type-select t-" + col.type}
                              value={col.type}
                              onChange={(e)=>setColumnType(col.name, e.target.value, col.detectedType)}
                            >
                              <option value="number">number</option>
                              <option value="text">text</option>
                              <option value="date">date</option>
                              <option value="boolean">boolean</option>
                            </select>
                            {col.type !== col.detectedType && (
                              <span className="override-note" title={`Auto-detected as ${col.detectedType}`}>overridden</span>
                            )}
                          </td>
                          <td>{col.uniqueCount.toLocaleString()}</td>
                          <td>{col.missingCount.toLocaleString()}</td>
                          <td>{col.fillStrategy || '—'}</td>
                          <td>{col.outlierCount > 0 ? <span className="dtype-badge outlier-badge">{col.outlierCount}</span> : '—'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {result.columnInfo.some(col => col.mergeSuggestions && col.mergeSuggestions.length > 0) && (
                  <React.Fragment>
                    <p className="section-label">Step 4 — Similar values found</p>
                    {result.columnInfo.filter(col => col.mergeSuggestions && col.mergeSuggestions.length > 0).map((col, ci) => (
                      <div className="merge-card" key={ci}>
                        <div className="merge-col">{col.name}</div>
                        {col.mergeSuggestions.map((sugg, si) => {
                          const key = normalizeKey(sugg.canonical);
                          const choices = mergeChoices[col.name] || {};
                          const applied = choices[key] !== undefined ? choices[key] : true;
                          const otherVariants = sugg.variants.filter(v => v.value !== sugg.canonical);
                          return (
                            <label className="merge-group" key={si}>
                              <input
                                type="checkbox"
                                checked={applied}
                                onChange={()=>toggleMerge(col.name, key, applied)}
                              />
                              <div className="merge-detail">
                                <div className="merge-canonical">Merge into "{sugg.canonical}"</div>
                                <div className="merge-variants">
                                  {otherVariants.map((v,vi) => (
                                    <React.Fragment key={vi}>
                                      <code>{v.value}</code>{vi < otherVariants.length-1 ? ', ' : ''}
                                    </React.Fragment>
                                  ))}
                                  {' '}({sugg.totalCount} total occurrence{sugg.totalCount>1?'s':''})
                                </div>
                              </div>
                            </label>
                          );
                        })}
                      </div>
                    ))}
                  </React.Fragment>
                )}

                <p className="section-label">Step 5 — Distributions</p>
                <div className="dist-grid">
                  {result.columnInfo.filter(col => col.distribution).map((col, i) => (
                    <div className="dist-card" key={i}>
                      <div className="dist-title">{col.name}</div>
                      <div className="dist-sub">
                        {col.distribution.kind === 'numeric'
                          ? `Range ${formatNum(col.distribution.min)} – ${formatNum(col.distribution.max)}`
                          : `${col.distribution.categories.length} categories shown`}
                      </div>
                      {col.distribution.kind === 'numeric' ? (
                        <React.Fragment>
                          <div className="dist-bars">
                            {col.distribution.bins.map((bin, bi) => {
                              const maxCount = Math.max(...col.distribution.bins.map(b=>b.count), 1);
                              const heightPct = (bin.count / maxCount) * 100;
                              const isOutlierBin = col.bounds && (bin.rangeEnd <= col.bounds.lowerBound || bin.rangeStart >= col.bounds.upperBound);
                              return (
                                <div
                                  key={bi}
                                  className={"dist-bar" + (isOutlierBin && bin.count > 0 ? " has-outlier" : "")}
                                  style={{height: Math.max(heightPct, 2) + '%'}}
                                  title={`${formatNum(bin.rangeStart)} – ${formatNum(bin.rangeEnd)}: ${bin.count}`}
                                ></div>
                              );
                            })}
                          </div>
                          <div className="dist-axis">
                            <span>{formatNum(col.distribution.min)}</span>
                            <span>{formatNum(col.distribution.max)}</span>
                          </div>
                          {col.outlierCount > 0 && (
                            <div className="outlier-note">{col.outlierCount} value{col.outlierCount>1?'s':''} outside typical range (orange bars)</div>
                          )}
                        </React.Fragment>
                      ) : (
                        <div className="dist-bars-cat">
                          {col.distribution.categories.map((cat, ci) => {
                            const maxCount = Math.max(...col.distribution.categories.map(c=>c.count), 1);
                            const widthPct = (cat.count / maxCount) * 100;
                            return (
                              <div className="dist-row" key={ci}>
                                <span className="dist-label" title={cat.label}>{cat.label}</span>
                                <span className="dist-track"><span className="dist-fill" style={{width: widthPct + '%'}}></span></span>
                                <span className="dist-count">{cat.count.toLocaleString()}</span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                {result.columnInfo.some(col => col.stats) && (
                  <React.Fragment>
                    <p className="section-label">Step 6 — Summary statistics</p>
                    <div className="table-wrap">
                      <table>
                        <thead>
                          <tr>
                            <th>Column</th>
                            <th>Count</th>
                            <th>Mean</th>
                            <th>Median</th>
                            <th>Std dev</th>
                            <th>Min</th>
                            <th>Max</th>
                            <th>Range</th>
                            <th>Q1</th>
                            <th>Q3</th>
                          </tr>
                        </thead>
                        <tbody>
                          {result.columnInfo.filter(col => col.stats).map((col, i) => (
                            <tr key={i}>
                              <td>{col.name}</td>
                              <td>{col.stats.count.toLocaleString()}</td>
                              <td>{formatNum(col.stats.mean)}</td>
                              <td>{formatNum(col.stats.median)}</td>
                              <td>{formatNum(col.stats.std)}</td>
                              <td>{formatNum(col.stats.min)}</td>
                              <td>{formatNum(col.stats.max)}</td>
                              <td>{formatNum(col.stats.range)}</td>
                              <td>{formatNum(col.stats.q1)}</td>
                              <td>{formatNum(col.stats.q3)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </React.Fragment>
                )}

                <p className="section-label">Step 7 — Preview cleaned data (first 50 rows)</p>
                <div className="table-wrap preview-scroll">
                  <table>
                    <thead>
                      <tr>
                        {result.headers.map((h,i)=> <th key={i}>{h}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {result.cleanedRows.slice(0,50).map((row, ri) => (
                        <tr key={ri}>
                          {result.headers.map((h,ci) => (
                            <td key={ci} title={String(row[h] ?? '')}>{
                              typeof row[h] === 'boolean' ? String(row[h]) : (row[h] ?? '')
                            }</td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <p className="section-label" style={{marginTop:'24px'}}>Step 7b — AI cleaning suggestions</p>
                <AICleaning result={result} />

                <p className="section-label" style={{marginTop:'24px'}}>Step 8 — Plain-language summary</p>
                <PlainSummaryView result={result} pivotSnapshot={pivotSnapshot} groupBySnapshot={groupBySnapshot} correlationSnapshot={correlationSnapshot} />

                <p className="section-label" style={{marginTop:'24px'}}>Step 9 — Pivot table (cross-tabulation)</p>
                <PivotTable rows={result.cleanedRows} columnInfo={result.columnInfo} onStateChange={setPivotSnapshot} />

                <p className="section-label" style={{marginTop:'24px'}}>Step 10 — Group-by summary statistics</p>
                <GroupBySummary rows={result.cleanedRows} columnInfo={result.columnInfo} onStateChange={setGroupBySnapshot} />

                <p className="section-label" style={{marginTop:'24px'}}>Step 11 — Correlation &amp; scatter plot</p>
                <CorrelationView rows={result.cleanedRows} columnInfo={result.columnInfo} onStateChange={setCorrelationSnapshot} />

                <p className="section-label" style={{marginTop:'24px'}}>Step 12 — Hypothesis testing</p>
                <HypothesisTesting rows={result.cleanedRows} columnInfo={result.columnInfo} />

                <p className="section-label" style={{marginTop:'24px'}}>Step 13 — AI dataset insights</p>
                <AIInsights result={result} />
              </React.Fragment>
            )}
          </React.Fragment>
        )}
      </div>
      )}

      {result && (
        <PdfReportTemplate
          fileMeta={fileMeta}
          result={result}
          pivotSnapshot={pivotSnapshot}
          groupBySnapshot={groupBySnapshot}
          correlationSnapshot={correlationSnapshot}
          sections={pdfSections}
        />
      )}

      {showPdfPicker && (
        <PdfSectionPicker
          initial={pdfSections}
          onCancel={()=>setShowPdfPicker(false)}
          onConfirm={async (sections)=>{
            setPdfSections(sections);
            setShowPdfPicker(false);
            setGeneratingPdf(true);
            // Wait a tick so PdfReportTemplate re-renders with the new section selection
            // before we snapshot it with html2canvas.
            await new Promise(r => setTimeout(r, 150));
            try{ await generatePdfReport(fileMeta.name); }
            catch(e){ setError('Could not generate PDF report: ' + e.message); }
            finally{ setGeneratingPdf(false); }
          }}
        />
      )}

      <footer>
        tidy — runs entirely in your browser, your data never leaves your device
        <div className="credit">
          Developed by Abud Maitha Jembe — Nairobi, Kenya · <a href="mailto:abudmaitha08@gmail.com">abudmaitha08@gmail.com</a> · <a href="https://linkedin.com/in/abud-maitha-200b3a232" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
