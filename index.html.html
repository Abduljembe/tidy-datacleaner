<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tidy — Data Cleaning Workbench</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2036%2036%22%3E%0A%3Crect%20width%3D%2236%22%20height%3D%2236%22%20rx%3D%226%22%20fill%3D%22%230d1117%22/%3E%0A%3Cpolygon%20points%3D%2218%2C3%2031%2C10.5%2031%2C25.5%2018%2C33%205%2C25.5%205%2C10.5%22%20stroke%3D%22%234f8ef7%22%20stroke-width%3D%221.5%22%20fill%3D%22none%22%20opacity%3D%220.6%22/%3E%0A%3Crect%20x%3D%2211%22%20y%3D%2211%22%20width%3D%2214%22%20height%3D%2214%22%20rx%3D%222%22%20stroke%3D%22%23a78bfa%22%20stroke-width%3D%221.5%22%20fill%3D%22none%22%20transform%3D%22rotate%2815%2018%2018%29%22/%3E%0A%3Cline%20x1%3D%2218%22%20y1%3D%2212%22%20x2%3D%2218%22%20y2%3D%2224%22%20stroke%3D%22%2322d3ee%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22/%3E%0A%3Cline%20x1%3D%2212%22%20y1%3D%2218%22%20x2%3D%2224%22%20y2%3D%2218%22%20stroke%3D%22%2322d3ee%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22/%3E%0A%3Ccircle%20cx%3D%2218%22%20cy%3D%2218%22%20r%3D%222.5%22%20fill%3D%22%234f8ef7%22/%3E%0A%3Ccircle%20cx%3D%2218%22%20cy%3D%2212%22%20r%3D%221.2%22%20fill%3D%22%2322d3ee%22/%3E%0A%3Ccircle%20cx%3D%2218%22%20cy%3D%2224%22%20r%3D%221.2%22%20fill%3D%22%2322d3ee%22/%3E%0A%3Ccircle%20cx%3D%2212%22%20cy%3D%2218%22%20r%3D%221.2%22%20fill%3D%22%2322d3ee%22/%3E%0A%3Ccircle%20cx%3D%2224%22%20cy%3D%2218%22%20r%3D%221.2%22%20fill%3D%22%2322d3ee%22/%3E%0A%3C/svg%3E" />
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root{
    --ink:#e8eaf0;
    --ink-soft:#8b92a8;
    --paper:#0d1117;
    --panel:#161b27;
    --line:#252d3d;
    --accent:#4f8ef7;
    --accent-soft:#1a2540;
    --warn:#f05a5a;
    --warn-soft:#2a1515;
    --mono: "IBM Plex Mono","SFMono-Regular",Consolas,monospace;
    --sans: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    /* Vibrant accents for type badges, charts, and highlights */
    --c-number:#4f8ef7;
    --c-number-soft:#1a2540;
    --c-text:#a78bfa;
    --c-text-soft:#22183d;
    --c-date:#f59e0b;
    --c-date-soft:#2a1e08;
    --c-boolean:#34d399;
    --c-boolean-soft:#0d2820;
    --c-pink:#f472b6;
    --c-pink-soft:#2a1020;
    --c-amber:#fbbf24;
    --c-amber-soft:#271e08;
    --c-teal:#22d3ee;
    --c-teal-soft:#0a2228;
    --c-coral:#fb7185;
    --c-coral-soft:#2a1018;
  }
  @font-face{font-family:"IBM Plex Mono";src:local("Consolas");}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
  }
  #root{min-height:100vh;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px;
    border-bottom:1px solid var(--line);
    background:#0a0e18;
    box-shadow:0 1px 0 rgba(79,142,247,0.15);
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .logo-mark{
    display:flex;align-items:center;justify-content:center;
    width:36px;height:36px;flex-shrink:0;
  }
  .brand .wordmark{
    display:flex;flex-direction:column;gap:1px;
  }
  .brand .wordmark .name{
    font-family:var(--mono);
    font-weight:700;
    font-size:17px;
    letter-spacing:3px;
    color:var(--ink);
    text-transform:uppercase;
  }
  .brand .tag{
    font-family:var(--mono);
    font-size:10px;
    color:var(--ink-soft);
    letter-spacing:1.5px;
    text-transform:uppercase;
  }
  .user-pill{
    display:flex;align-items:center;gap:10px;
    font-size:13px;color:var(--ink-soft);
  }
  .user-pill button{
    font-family:var(--mono);
    font-size:12px;
    border:1px solid var(--line);
    background:var(--panel);
    padding:6px 12px;
    cursor:pointer;
    border-radius:3px;
    color:var(--ink);
  }
  .user-pill button:hover{border-color:var(--ink);}

  /* ---------- Login screen ---------- */
  .login-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .login-card{
    width:100%;max-width:420px;
    background:var(--panel);
    border:1px solid var(--line);
    padding:36px;
    position:relative;
  }
  .login-card::before{
    content:"";
    position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg, #4f8ef7 0%, #a78bfa 50%, #22d3ee 100%);
  }
  .login-card h1{
    font-family:var(--mono);
    font-size:22px;
    margin:0 0 6px;
    letter-spacing:1px;
  }
  .login-card p.sub{
    color:var(--ink-soft);
    font-size:14px;
    margin:0 0 28px;
    line-height:1.5;
  }
  .field{margin-bottom:16px;}
  .field label{
    display:block;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:3px;
    font-size:14px;
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
  }
  .field input:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
    border-color:var(--accent);
  }
  .login-actions{display:flex;gap:10px;margin-top:24px;}
  .remember-me-row{
    display:flex;align-items:center;gap:8px;
    font-size:13px;color:var(--ink-soft);
    margin-top:4px;cursor:pointer;
  }
  .remember-me-row input{cursor:pointer;}
  .btn{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:0.5px;
    padding:11px 18px;
    border-radius:3px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--paper);
    cursor:pointer;
    flex:1;
    text-align:center;
  }
  .btn:hover{background:#1e2a4a;border-color:var(--accent);}
  .btn.secondary{
    background:var(--panel);
    color:var(--ink);
  }
  .btn.secondary:hover{background:var(--paper);}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .err-msg{
    font-size:13px;
    color:var(--warn);
    margin-top:14px;
    font-family:var(--mono);
  }
  .success-msg{
    font-size:13px;
    color:var(--accent);
    margin-top:14px;
    font-family:var(--mono);
  }
  .login-foot{
    margin-top:22px;
    font-size:12px;
    color:var(--ink-soft);
    line-height:1.6;
    border-top:1px solid var(--line);
    padding-top:16px;
  }

  /* ---------- Main app ---------- */
  .app{
    max-width:1080px;
    margin:0 auto;
    padding:32px 28px 80px;
  }
  .section-label{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 10px;
  }

  /* Dropzone */
  .dropzone{
    border:1.5px dashed var(--line);
    border-radius:4px;
    background:var(--panel);
    padding:48px 24px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .dropzone.drag{
    border-color:var(--accent);
    background:var(--accent-soft);
  }
  .dropzone h2{
    font-size:18px;
    font-weight:500;
    margin:0 0 6px;
  }
  .dropzone p{
    margin:0;
    color:var(--ink-soft);
    font-size:13px;
  }
  .dropzone .icon{
    font-family:var(--mono);
    font-size:28px;
    font-weight:700;
    margin-bottom:14px;
    background:linear-gradient(135deg, var(--c-number) 0%, var(--c-text) 50%, var(--c-pink) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    display:inline-block;
  }
  input[type=file]{display:none;}

  /* Intro summary on dashboard */
  .intro-summary{
    margin-top:32px;
  }
  .feature-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:14px;
  }
  .feature-item{
    display:flex;
    gap:12px;
    align-items:flex-start;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    padding:14px 16px;
  }
  .feature-icon{
    flex-shrink:0;
    width:28px;height:28px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);
    font-size:13px;
    font-weight:700;
  }
  .feature-icon.blue{background:var(--c-number-soft); color:var(--c-number);}
  .feature-icon.purple{background:var(--c-text-soft); color:var(--c-text);}
  .feature-icon.pink{background:var(--c-pink-soft); color:var(--c-pink);}
  .feature-icon.amber{background:var(--c-amber-soft); color:var(--c-amber);}
  .feature-icon.teal{background:var(--c-teal-soft); color:var(--c-teal);}
  .feature-icon.coral{background:var(--c-coral-soft); color:var(--c-coral);}
  .feature-title{
    font-size:14px;
    font-weight:500;
    margin-bottom:4px;
  }
  .feature-text{
    font-size:13px;
    color:var(--ink-soft);
    line-height:1.5;
  }
  .intro-note{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
    text-align:center;
    margin-top:20px;
  }

  /* Loading */
  .loading{
    display:flex;align-items:center;gap:12px;
    font-family:var(--mono);
    font-size:13px;
    color:var(--ink-soft);
    padding:20px 0;
  }
  .spinner{
    width:14px;height:14px;
    border:2px solid var(--line);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* File summary bar */
  .file-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    margin-bottom:24px;
    flex-wrap:wrap;
    gap:12px;
  }
  .file-bar .fname{
    font-family:var(--mono);
    font-size:14px;
    font-weight:600;
  }
  .file-bar .fmeta{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .file-bar .actions{display:flex;gap:8px;}
  .btn-sm{
    font-family:var(--mono);
    font-size:12px;
    padding:8px 14px;
    border-radius:3px;
    border:1px solid var(--line);
    background:var(--panel);
    cursor:pointer;
    color:var(--ink);
  }
  .btn-sm:hover{border-color:var(--ink);}
  .btn-sm.primary{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .btn-sm.primary:hover{background:#28593f;}

  /* Cleaning report */
  .report-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:28px;
  }
  .stat-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    padding:14px 16px;
  }
  .stat-card .num{
    font-family:var(--mono);
    font-size:24px;
    font-weight:700;
    line-height:1.1;
  }
  .stat-card .label{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .stat-card.accent .num{color:var(--accent);}
  .stat-card.warn .num{color:var(--warn);}
  .stat-card.blue .num{color:var(--c-number);}
  .stat-card.purple .num{color:var(--c-text);}
  .stat-card.pink .num{color:var(--c-pink);}

  /* Actions log */
  .log-list{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    margin-bottom:28px;
    overflow:hidden;
  }
  .log-item{
    display:flex;align-items:flex-start;gap:10px;
    padding:11px 16px;
    font-size:13px;
    border-bottom:1px solid var(--line);
  }
  .log-item:last-child{border-bottom:none;}
  .log-item .tag{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:1px;
    text-transform:uppercase;
    background:var(--accent-soft);
    color:var(--accent);
    padding:3px 7px;
    border-radius:3px;
    flex-shrink:0;
    margin-top:1px;
  }
  .log-item.empty .tag{
    background:var(--warn-soft);
    color:var(--warn);
  }

  /* Columns table */
  .table-wrap{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    overflow-x:auto;
    margin-bottom:28px;
  }
  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  th,td{
    text-align:left;
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  th{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--ink-soft);
    background:var(--paper);
  }
  tr:last-child td{border-bottom:none;}
  .type-select{
    font-family:var(--mono);
    font-size:11px;
    font-weight:600;
    padding:3px 6px;
    border-radius:3px;
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink);
    cursor:pointer;
  }
  .type-select:hover{border-color:var(--ink);}
  .type-select.t-number{ background:var(--c-number-soft); color:var(--c-number); border-color:var(--c-number-soft); }
  .type-select.t-text{ background:var(--c-text-soft); color:var(--c-text); border-color:var(--c-text-soft); }
  .type-select.t-date{ background:var(--c-date-soft); color:var(--c-date); border-color:var(--c-date-soft); }
  .type-select.t-boolean{ background:var(--c-boolean-soft); color:var(--c-boolean); border-color:var(--c-boolean-soft); }
  .override-note{
    font-family:var(--mono);
    font-size:10px;
    color:var(--accent);
    margin-left:6px;
    letter-spacing:0.5px;
  }

  /* Merge suggestions */
  .merge-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .merge-card .merge-col{
    font-family:var(--mono);
    font-size:12px;
    font-weight:600;
    margin-bottom:10px;
  }
  .merge-group{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:8px 0;
    border-top:1px solid var(--line);
    font-size:13px;
  }
  .merge-group:first-of-type{border-top:none;}
  .merge-group input[type=checkbox]{
    margin-top:3px;
    flex-shrink:0;
    cursor:pointer;
    accent-color:var(--accent);
  }
  .merge-group .merge-detail{flex:1;}
  .merge-group .merge-canonical{
    font-weight:500;
  }
  .merge-group .merge-variants{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .merge-group .merge-variants code{
    font-family:var(--mono);
    background:var(--paper);
    padding:1px 5px;
    border-radius:2px;
    font-size:11px;
  }


  /* Distribution charts */
  .dist-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:16px;
    margin-bottom:28px;
  }
  .dist-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    padding:16px 18px;
  }
  .dist-card .dist-title{
    font-family:var(--mono);
    font-size:13px;
    font-weight:600;
    margin-bottom:2px;
  }
  .dist-card .dist-sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:14px;
  }
  .dist-bars{
    display:flex;
    align-items:flex-end;
    gap:3px;
    height:90px;
  }
  .dist-bar{
    flex:1;
    background:var(--c-number);
    border-radius:2px 2px 0 0;
    min-height:2px;
    position:relative;
  }
  .dist-bar.has-outlier{
    background:var(--warn);
  }
  .dist-bars-cat{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .dist-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
  }
  .dist-row .dist-label{
    width:90px;
    flex-shrink:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    color:var(--ink-soft);
  }
  .dist-row .dist-track{
    flex:1;
    height:14px;
    background:var(--paper);
    border-radius:2px;
    overflow:hidden;
  }
  .dist-row .dist-fill{
    height:100%;
    background:var(--c-text);
    border-radius:2px;
  }
  .dist-row .dist-count{
    width:40px;
    text-align:right;
    flex-shrink:0;
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-soft);
  }
  .dist-axis{
    display:flex;
    justify-content:space-between;
    font-family:var(--mono);
    font-size:10px;
    color:var(--ink-soft);
    margin-top:6px;
  }
  .outlier-note{
    font-size:11px;
    color:var(--warn);
    margin-top:8px;
    font-family:var(--mono);
  }

  .missing-bar{
    display:inline-block;
    height:6px;
    background:var(--warn);
    border-radius:2px;
    vertical-align:middle;
    margin-right:6px;
  }
  .missing-bar-track{
    display:inline-block;
    width:60px;
    height:6px;
    background:var(--line);
    border-radius:2px;
    overflow:hidden;
    vertical-align:middle;
    margin-right:8px;
  }

  /* Preview table */
  .preview-scroll{
    max-height:360px;
    overflow:auto;
  }
  .preview-scroll table td, .preview-scroll table th{
    font-size:12px;
    padding:8px 12px;
    max-width:220px;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  footer{
    text-align:center;
    font-size:12px;
    color:var(--ink-soft);
    padding:30px 0 10px;
    font-family:var(--mono);
  }
  footer .credit{
    margin-top:6px;
    font-size:11px;
  }
  footer .credit a{
    color:var(--ink-soft);
    text-decoration:none;
    border-bottom:1px dotted var(--line);
  }
  footer .credit a:hover{
    color:var(--accent);
    border-bottom-color:var(--accent);
  }

  /* ---------- Top-level tab nav ---------- */
  .top-tabs{
    display:flex;gap:12px;
    padding:18px 28px;
    background:#0a0e18;
    border-bottom:1px solid var(--line);
  }
  .top-tab{
    font-family:var(--sans);
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    background:var(--panel);
    border:1px solid var(--line);
    padding:12px 20px;
    cursor:pointer;
    border-radius:8px;
    display:flex;align-items:center;gap:9px;
    transition:border-color 0.15s, color 0.15s, background 0.15s;
  }
  .top-tab .tt-icon{font-family:var(--mono);font-size:15px;}
  .top-tab:hover{color:var(--ink);border-color:var(--ink-soft);}
  .top-tab.active{
    color:var(--ink);
    background:var(--accent-soft);
    border-color:var(--accent);
  }
  .top-tab.active.collect-active{
    background:var(--c-teal-soft);
    border-color:var(--c-teal);
  }
  .top-tab.active.history-active{
    background:var(--c-amber-soft);
    border-color:var(--c-amber);
  }

  /* ---------- History module ---------- */
  .history-wrap{padding:28px;max-width:900px;margin:0 auto;}
  .history-empty{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .history-empty .icon{font-size:32px;margin-bottom:12px;font-family:var(--mono);}
  .history-list{display:flex;flex-direction:column;gap:12px;}
  .history-card{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:18px 20px;transition:border-color 0.15s;
  }
  .history-card:hover{border-color:var(--c-amber);}
  .history-card .hc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
  .history-card .hc-icon{font-size:22px;flex-shrink:0;margin-top:2px;}
  .history-card .hc-title{font-size:15px;font-weight:700;margin-bottom:3px;word-break:break-all;}
  .history-card .hc-date{font-size:11px;color:var(--ink-soft);font-family:var(--mono);}
  .history-card .hc-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .history-pill{
    font-size:11px;font-family:var(--mono);
    background:var(--paper);border:1px solid var(--line);
    border-radius:4px;padding:3px 8px;color:var(--ink-soft);
  }
  .history-pill.good{border-color:var(--c-teal);color:var(--c-teal);}
  .history-pill.warn{border-color:var(--c-amber);color:var(--c-amber);}
  .history-card .hc-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .history-card .hc-no-data{font-size:11px;color:var(--ink-soft);font-style:italic;margin-top:4px;}
  .history-storage-bar{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;
    font-size:12px;color:var(--ink-soft);
  }
  .history-storage-track{flex:1;height:6px;background:var(--paper);border-radius:3px;}
  .history-storage-fill{height:6px;border-radius:3px;background:var(--c-teal);}
  .history-storage-fill.warn{background:var(--c-amber);}
  .history-storage-fill.danger{background:var(--warn);}


  /* ---------- Collect module ---------- */
  .collect-wrap{padding:28px;max-width:1100px;margin:0 auto;}
  .collect-subtabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--line);}
  .collect-subtab{
    font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;
    color:var(--ink-soft);background:none;border:none;padding:10px 4px;margin-right:18px;
    cursor:pointer;border-bottom:2px solid transparent;
  }
  .collect-subtab.active{color:var(--c-teal);border-bottom-color:var(--c-teal);}

  .form-list{display:flex;flex-direction:column;gap:10px;}
  .form-card{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .form-card:hover{border-color:var(--c-teal);}
  .form-card .fc-title{font-weight:600;font-size:14px;}
  .form-card .fc-meta{font-size:11px;color:var(--ink-soft);font-family:var(--mono);margin-top:3px;}
  .form-card .fc-actions{display:flex;gap:8px;flex-shrink:0;}

  .qtype-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:14px 0 20px;}
  .qtype-btn{
    background:var(--panel);border:1px solid var(--line);border-radius:6px;
    padding:10px 12px;cursor:pointer;text-align:left;color:var(--ink);font-size:12px;
    display:flex;align-items:center;gap:8px;
  }
  .qtype-btn:hover{border-color:var(--c-teal);background:var(--c-teal-soft);}
  .qtype-btn .qi{font-family:var(--mono);font-size:14px;flex-shrink:0;}

  .question-card{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:16px 18px;margin-bottom:12px;
  }
  .question-card.is-group{border-color:var(--c-text);background:linear-gradient(180deg, var(--c-text-soft) 0%, var(--panel) 60px);}
  .question-card.is-repeat{border-color:var(--c-amber);background:linear-gradient(180deg, var(--c-amber-soft) 0%, var(--panel) 60px);}
  .q-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .q-badge{
    font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;
    padding:3px 8px;border-radius:4px;flex-shrink:0;
  }
  .q-row{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
  .q-row input[type=text], .q-row input[type=number], .q-row select, .q-row textarea{
    background:var(--paper);border:1px solid var(--line);color:var(--ink);
    border-radius:5px;padding:8px 10px;font-size:13px;font-family:var(--sans);
  }
  .q-row label.inline{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);}
  .choice-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
  .choice-row input{flex:1;}
  .icon-btn{
    background:none;border:1px solid var(--line);color:var(--ink-soft);
    border-radius:5px;width:28px;height:28px;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:13px;
  }
  .icon-btn:hover{border-color:var(--warn);color:var(--warn);}
  .icon-btn.move:hover{border-color:var(--accent);color:var(--accent);}
  .nested-children{margin-left:18px;padding-left:14px;border-left:2px solid var(--line);margin-top:10px;}

  .fill-form{max-width:680px;margin:0 auto;}
  .fill-q{margin-bottom:22px;}
  .fill-q label{display:block;font-size:14px;font-weight:600;margin-bottom:8px;}
  .fill-q .req-star{color:var(--warn);margin-left:3px;}
  .fill-q .hint{font-size:11px;color:var(--ink-soft);margin-bottom:8px;font-family:var(--mono);}
  .fill-q input[type=text], .fill-q input[type=number], .fill-q input[type=date],
  .fill-q input[type=datetime-local], .fill-q select, .fill-q textarea{
    width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:6px;padding:10px 12px;font-size:14px;font-family:var(--sans);
  }
  .fill-q input:focus, .fill-q select:focus, .fill-q textarea:focus{border-color:var(--accent);outline:none;}
  .choice-option{
    display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);
    border-radius:6px;margin-bottom:6px;cursor:pointer;
  }
  .choice-option:hover{border-color:var(--c-teal);}
  .choice-option.selected{border-color:var(--c-teal);background:var(--c-teal-soft);}
  .geo-box{display:flex;align-items:center;gap:10px;}
  .geo-result{font-family:var(--mono);font-size:12px;color:var(--c-boolean);}
  .group-box{border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:22px;background:var(--c-text-soft);}
  .group-box .group-title{font-weight:600;font-size:13px;margin-bottom:14px;color:var(--c-text);text-transform:uppercase;letter-spacing:0.5px;font-family:var(--mono);}
  .repeat-instance{border:1px dashed var(--line);border-radius:8px;padding:14px;margin-bottom:10px;position:relative;}
  .repeat-instance .ri-remove{position:absolute;top:10px;right:10px;}

  .resp-table-wrap{overflow:auto;max-height:520px;border:1px solid var(--line);border-radius:8px;}
  .resp-table-wrap table{border-collapse:collapse;width:100%;font-size:12px;}
  .resp-table-wrap th, .resp-table-wrap td{padding:8px 12px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:left;}
  .resp-table-wrap th{background:var(--panel);position:sticky;top:0;font-family:var(--mono);text-transform:uppercase;font-size:10px;color:var(--ink-soft);}

  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .empty-state .icon{font-size:32px;margin-bottom:12px;font-family:var(--mono);}

  /* ---------- Pivot table ---------- */
  .pivot-controls{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
  .pivot-field{display:flex;flex-direction:column;gap:5px;}
  .pivot-field label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-soft);}
  .pivot-field select{
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:6px;padding:8px 10px;font-size:13px;min-width:160px;
  }
  .pivot-table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px;max-height:480px;}
  .pivot-table-wrap table{border-collapse:collapse;width:100%;font-size:12px;}
  .pivot-table-wrap th, .pivot-table-wrap td{padding:8px 12px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);text-align:right;white-space:nowrap;}
  .pivot-table-wrap th{background:var(--panel);font-family:var(--mono);text-transform:uppercase;font-size:10px;color:var(--ink-soft);position:sticky;top:0;}
  .pivot-table-wrap td:first-child, .pivot-table-wrap th:first-child{
    text-align:left;position:sticky;left:0;background:var(--panel);font-weight:600;z-index:1;
  }
  .pivot-table-wrap tr:last-child td{font-weight:700;background:var(--accent-soft);}
  .pivot-table-wrap td:last-child{font-weight:700;background:var(--accent-soft);}
  .pivot-cell-bar{
    position:absolute;left:0;top:0;bottom:0;background:var(--c-teal-soft);z-index:-1;
  }
  .pivot-cell{position:relative;}

  /* ---------- Group-by summary stats ---------- */
  .groupby-controls{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
  .groupby-table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px;max-height:480px;}
  .groupby-table-wrap table{border-collapse:collapse;width:100%;font-size:12px;}
  .groupby-table-wrap th, .groupby-table-wrap td{padding:8px 12px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap;}
  .groupby-table-wrap th{background:var(--panel);font-family:var(--mono);text-transform:uppercase;font-size:10px;color:var(--ink-soft);position:sticky;top:0;}
  .groupby-table-wrap td:first-child, .groupby-table-wrap th:first-child{text-align:left;font-weight:600;position:sticky;left:0;background:var(--panel);}
  .groupby-bar-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
  .groupby-bar{height:6px;border-radius:3px;background:var(--c-coral);}

  /* ---------- Correlation / scatter ---------- */
  .corr-controls{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
  .corr-stat-row{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:18px;}
  .corr-stat{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:14px 18px;min-width:160px;
  }
  .corr-stat .cs-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-soft);margin-bottom:6px;}
  .corr-stat .cs-value{font-size:22px;font-weight:700;font-family:var(--mono);}
  .corr-interpretation{
    background:var(--c-teal-soft);border:1px solid var(--c-teal);border-radius:8px;
    padding:12px 16px;font-size:13px;margin-bottom:18px;color:var(--ink);
  }
  .scatter-svg{background:var(--panel);border:1px solid var(--line);border-radius:8px;width:100%;}
  .scatter-svg .axis-line{stroke:var(--line);stroke-width:1;}
  .scatter-svg .axis-label{fill:var(--ink-soft);font-size:11px;font-family:var(--mono);}
  .scatter-svg .point{fill:var(--c-teal);opacity:0.65;}
  .scatter-svg .trend-line{stroke:var(--c-coral);stroke-width:2;stroke-dasharray:4 3;}

  /* ---------- PDF report template (offscreen, light theme for print) ---------- */
  #pdf-report-root{
    position:fixed; top:0; left:-99999px; width:780px;
    background:#ffffff; color:#1a1a1a; font-family:var(--sans);
    padding:0;
  }
  .pdf-page{width:780px; padding:36px 40px; background:#ffffff; box-sizing:border-box;}
  .pdf-h1{font-size:24px;font-weight:700;margin:0 0 4px;color:#0a0e18;}
  .pdf-sub{font-size:12px;color:#666;margin:0 0 24px;font-family:var(--mono);}
  .pdf-h2{font-size:15px;font-weight:700;margin:26px 0 10px;padding-bottom:6px;border-bottom:2px solid #1a1a1a;color:#0a0e18;}
  .pdf-kpi-row{display:flex;gap:14px;margin-bottom:8px;}
  .pdf-kpi{flex:1;background:#f4f5f7;border:1px solid #e0e2e8;border-radius:8px;padding:12px 14px;}
  .pdf-kpi .k-label{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:#777;font-family:var(--mono);margin-bottom:4px;}
  .pdf-kpi .k-value{font-size:20px;font-weight:700;color:#0a0e18;}
  .pdf-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:6px;}
  .pdf-table th, .pdf-table td{border:1px solid #ddd;padding:6px 8px;text-align:left;}
  .pdf-table th{background:#f4f5f7;font-family:var(--mono);text-transform:uppercase;font-size:9px;color:#555;}
  .pdf-table td{text-align:right;}
  .pdf-table td:first-child{text-align:left;font-weight:600;}
  .pdf-note{font-size:10px;color:#777;margin:6px 0 0;font-style:italic;}
  .pdf-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .pdf-bar-label{width:90px;font-size:10px;color:#444;flex-shrink:0;text-align:right;}
  .pdf-bar-track{flex:1;background:#eee;border-radius:3px;height:14px;position:relative;}
  .pdf-bar-fill{background:#2563eb;height:14px;border-radius:3px;}
  .pdf-bar-value{font-size:10px;color:#333;width:60px;font-family:var(--mono);}
  .pdf-footer{font-size:9px;color:#999;text-align:center;margin-top:30px;padding-top:14px;border-top:1px solid #eee;}

  /* ---------- PDF section picker ---------- */
  .pdf-picker-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;
    display:flex;align-items:center;justify-content:center;
  }
  .pdf-picker{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:24px 26px;width:380px;max-width:90vw;
  }
  .pdf-picker h3{margin:0 0 4px;font-size:16px;}
  .pdf-picker .pp-sub{font-size:12px;color:var(--ink-soft);margin:0 0 18px;}
  .pdf-picker-option{
    display:flex;align-items:flex-start;gap:10px;padding:9px 0;
    border-bottom:1px solid var(--line);cursor:pointer;
  }
  .pdf-picker-option:last-of-type{border-bottom:none;}
  .pdf-picker-option input{margin-top:2px;flex-shrink:0;}
  .pdf-picker-option .pp-label{font-size:13px;font-weight:600;}
  .pdf-picker-option .pp-desc{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .pdf-picker-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}

  /* ---------- Plain-language summary (in-app) ---------- */
  .plain-summary{display:flex;flex-direction:column;gap:12px;}
  .plain-card{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:16px 18px;border-left:3px solid var(--accent);
  }
  .plain-card .pc-heading{font-size:13px;font-weight:700;margin-bottom:6px;color:var(--ink);}
  .plain-card .pc-text{font-size:13px;line-height:1.6;color:var(--ink-soft);}

  /* ---------- Plain-language summary (PDF) ---------- */
  .pdf-plain-card{
    background:#f7f8fa;border:1px solid #e0e2e8;border-left:4px solid #2563eb;
    border-radius:8px;padding:14px 16px;margin-bottom:12px;
  }
  .pdf-plain-card .ppc-heading{font-size:13px;font-weight:700;margin-bottom:5px;color:#0a0e18;}
  .pdf-plain-card .ppc-text{font-size:12px;line-height:1.55;color:#333;}

  /* ---------- AI Cleaning & Insights ---------- */
  .ai-section{border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .ai-header{
    display:flex;align-items:center;gap:12px;
    padding:14px 18px;background:var(--panel);
    border-bottom:1px solid var(--line);
  }
  .ai-header .ai-badge{
    font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;
    padding:3px 10px;border-radius:20px;background:var(--c-teal-soft);color:var(--c-teal);
    flex-shrink:0;
  }
  .ai-header .ai-title{font-weight:600;font-size:14px;flex:1;}
  .ai-body{padding:18px;}
  .ai-loading{display:flex;align-items:center;gap:10px;color:var(--ink-soft);font-size:13px;padding:8px 0;}
  .ai-loading .spinner{
    width:16px;height:16px;border:2px solid var(--line);
    border-top-color:var(--c-teal);border-radius:50%;
    animation:spin 0.8s linear infinite;flex-shrink:0;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .ai-error{color:var(--warn);font-size:13px;padding:8px 0;}
  .ai-suggestion{
    background:var(--paper);border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;margin-bottom:10px;
  }
  .ai-suggestion .as-type{
    font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;
    color:var(--c-amber);margin-bottom:5px;
  }
  .ai-suggestion .as-text{font-size:13px;line-height:1.55;color:var(--ink);}
  .ai-suggestion .as-col{font-weight:600;color:var(--c-teal);}
  .ai-insight{
    border-left:3px solid var(--accent);background:var(--panel);
    border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:10px;
  }
  .ai-insight.pattern{border-left-color:var(--c-teal);}
  .ai-insight.anomaly{border-left-color:var(--c-amber);}
  .ai-insight.recommendation{border-left-color:var(--c-coral);}
  .ai-insight .ai-insight-label{
    font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;
    color:var(--ink-soft);margin-bottom:4px;
  }
  .ai-insight .ai-insight-text{font-size:13px;line-height:1.6;color:var(--ink);}
  .ai-run-btn{margin-top:4px;}
  .ai-disclaimer{font-size:11px;color:var(--ink-soft);font-style:italic;margin-top:14px;}

  /* ---------- Hypothesis testing ---------- */
  .hyp-controls{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
  .hyp-result{border:1px solid var(--line);border-radius:10px;padding:20px 22px;margin-top:4px;}
  .hyp-result.significant{border-color:var(--c-teal);background:var(--c-teal-soft);}
  .hyp-result.not-significant{border-color:var(--line);background:var(--panel);}
  .hyp-verdict{font-size:16px;font-weight:700;margin-bottom:8px;}
  .hyp-verdict.sig{color:var(--c-teal);}
  .hyp-verdict.not-sig{color:var(--ink-soft);}
  .hyp-plain{font-size:14px;line-height:1.6;margin-bottom:14px;}
  .hyp-stats{display:flex;gap:16px;flex-wrap:wrap;}
  .hyp-stat{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:10px 14px;min-width:120px;}
  .hyp-stat .hs-label{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-soft);font-family:var(--mono);margin-bottom:4px;}
  .hyp-stat .hs-value{font-size:18px;font-weight:700;font-family:var(--mono);}
  .hyp-note{font-size:11px;color:var(--ink-soft);margin-top:12px;font-style:italic;}
</style>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useRef, useCallback } = React;

/* ---------------------------------------------------------------
   AUTH — simple client-side login.
   Accounts persist via localStorage when available, falling back to
   an in-memory store for this session if localStorage is blocked
   (e.g. some sandboxed/preview contexts). Good for a personal /
   small-team tool. For production with real users across devices,
   swap this for a real backend (e.g. Firebase Auth, Supabase, or
   your own API).
----------------------------------------------------------------*/
const memoryUserStore = {};
const STORAGE_KEY = 'tidy_users';

function loadUsers(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){
    return memoryUserStore;
  }
}
function saveUsers(users){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
  }catch(e){
    Object.assign(memoryUserStore, users);
  }
}

const SESSION_KEY = 'tidy_session';

// "Remember me" checked -> session persists across browser restarts (localStorage).
// Unchecked -> session only lasts for this tab/browser session (sessionStorage).
function saveSession(email, remember){
  try{
    if(remember){
      localStorage.setItem(SESSION_KEY, email);
      sessionStorage.removeItem(SESSION_KEY);
    } else {
      sessionStorage.setItem(SESSION_KEY, email);
      localStorage.removeItem(SESSION_KEY);
    }
  }catch(e){ /* storage unavailable, session just won't persist */ }
}
function loadSession(){
  try{
    return localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY) || null;
  }catch(e){ return null; }
}
function clearSession(){
  try{
    localStorage.removeItem(SESSION_KEY);
    sessionStorage.removeItem(SESSION_KEY);
  }catch(e){ /* no-op */ }
}

   DATA CLEANING LOGIC
----------------------------------------------------------------*/

// Detect a column's dominant type by sampling values
function detectType(values){
  let numCount = 0, dateCount = 0, boolCount = 0, total = 0;
  for(const v of values){
    if(v === null || v === undefined || v === '') continue;
    total++;
    const s = String(v).trim();
    if(/^(true|false|yes|no)$/i.test(s)) boolCount++;
    else if(s !== '' && !isNaN(Number(s.replace(/,/g,'')))) numCount++;
    else if(!isNaN(Date.parse(s)) && /[\/\-]/.test(s) && s.length >= 6) dateCount++;
  }
  if(total === 0) return 'empty';
  if(numCount / total > 0.85) return 'number';
  if(dateCount / total > 0.85) return 'date';
  if(boolCount / total > 0.85) return 'boolean';
  return 'text';
}

function isEmptyVal(v){
  return v === null || v === undefined || (typeof v === 'string' && v.trim() === '');
}

// Normalize a string for fuzzy comparison: lowercase, collapse whitespace, trim
function normalizeKey(v){
  return String(v).trim().replace(/\s+/g, ' ').toLowerCase();
}

// Find groups of near-duplicate values within a column (differ only by case/whitespace)
function findMergeSuggestions(values){
  const groups = {}; // normalizedKey -> { variants: {value: count} }
  values.forEach(v => {
    if(isEmptyVal(v)) return;
    const s = String(v);
    const key = normalizeKey(s);
    if(!groups[key]) groups[key] = {};
    groups[key][s] = (groups[key][s] || 0) + 1;
  });
  const suggestions = [];
  Object.entries(groups).forEach(([key, variants]) => {
    const variantEntries = Object.entries(variants);
    if(variantEntries.length > 1){
      // pick the most frequent variant as the canonical form
      variantEntries.sort((a,b) => b[1]-a[1]);
      const canonical = variantEntries[0][0];
      suggestions.push({
        canonical,
        variants: variantEntries.map(([value,count]) => ({value, count})),
        totalCount: variantEntries.reduce((s,[,c])=>s+c,0)
      });
    }
  });
  return suggestions;
}


// Main cleaning routine. Returns { cleanedRows, columns, report, log, mergeSuggestions }
// typeOverrides: { columnName: 'number'|'text'|'date'|'boolean' }
// mergeChoices: { columnName: { normalizedKey: true/false } } - which merge groups to apply (default: all applied)
function cleanData(rows, headers, typeOverrides = {}, mergeChoices = {}){
  const log = [];
  let workingRows = rows.map(r => ({...r}));
  const originalRowCount = workingRows.length;
  const originalColCount = headers.length;

  // 1. Trim column headers, dedupe empty/blank headers
  const trimmedHeaders = headers.map(h => (h || '').toString().trim());
  let headerDupes = 0;
  const seenHeaders = {};
  const finalHeaders = trimmedHeaders.map((h, i) => {
    let name = h === '' ? `column_${i+1}` : h;
    if(seenHeaders[name] !== undefined){
      headerDupes++;
      seenHeaders[name]++;
      name = `${name}_${seenHeaders[name]}`;
    } else {
      seenHeaders[name] = 0;
    }
    return name;
  });
  if(headerDupes > 0){
    log.push({ tag: 'columns', text: `Renamed ${headerDupes} duplicate or blank column header${headerDupes>1?'s':''} to keep columns unique.` });
  }
  // remap rows to final headers
  workingRows = workingRows.map(r => {
    const newR = {};
    headers.forEach((h, i) => { newR[finalHeaders[i]] = r[h]; });
    return newR;
  });

  // 2. Trim whitespace on all string cells
  let trimmedCells = 0;
  workingRows.forEach(r => {
    finalHeaders.forEach(h => {
      const v = r[h];
      if(typeof v === 'string'){
        const t = v.trim().replace(/\s+/g, ' ');
        if(t !== v){ trimmedCells++; r[h] = t; }
      }
    });
  });
  if(trimmedCells > 0){
    log.push({ tag: 'whitespace', text: `Trimmed extra whitespace from ${trimmedCells.toLocaleString()} cell value${trimmedCells>1?'s':''}.` });
  }

  // 3. Remove fully empty rows
  const beforeEmpty = workingRows.length;
  workingRows = workingRows.filter(r => finalHeaders.some(h => !isEmptyVal(r[h])));
  const emptyRowsRemoved = beforeEmpty - workingRows.length;
  if(emptyRowsRemoved > 0){
    log.push({ tag: 'empty rows', text: `Removed ${emptyRowsRemoved.toLocaleString()} completely empty row${emptyRowsRemoved>1?'s':''}.` });
  }

  // 4. Remove exact duplicate rows
  const beforeDupe = workingRows.length;
  const seenRows = new Set();
  workingRows = workingRows.filter(r => {
    const key = JSON.stringify(finalHeaders.map(h => r[h]));
    if(seenRows.has(key)) return false;
    seenRows.add(key);
    return true;
  });
  const dupeRowsRemoved = beforeDupe - workingRows.length;
  if(dupeRowsRemoved > 0){
    log.push({ tag: 'duplicates', text: `Removed ${dupeRowsRemoved.toLocaleString()} duplicate row${dupeRowsRemoved>1?'s':''}.` });
  }

  // 5. Merge near-duplicate categorical values (e.g. "kenya" / "Kenya " / "KENYA")
  const mergeSuggestionsByColumn = {};
  let totalMerged = 0;
  finalHeaders.forEach(h => {
    const rawValues = workingRows.map(r => r[h]);
    const detected = typeOverrides[h] || detectType(rawValues);
    if(detected !== 'text') return; // only merge for text columns

    const suggestions = findMergeSuggestions(rawValues);
    if(suggestions.length === 0) return;
    mergeSuggestionsByColumn[h] = suggestions;

    const choices = mergeChoices[h] || {};
    suggestions.forEach(sugg => {
      const key = normalizeKey(sugg.canonical);
      const apply = choices[key] !== undefined ? choices[key] : true; // default: apply
      if(!apply) return;
      const variantValues = new Set(sugg.variants.map(v => v.value));
      workingRows.forEach(r => {
        if(variantValues.has(r[h]) && r[h] !== sugg.canonical){
          r[h] = sugg.canonical;
          totalMerged++;
        }
      });
    });
  });
  if(totalMerged > 0){
    log.push({ tag: 'merged values', text: `Merged ${totalMerged.toLocaleString()} value${totalMerged>1?'s':''} that were duplicates differing only by case or spacing (e.g. "kenya" → "Kenya").` });
  }

  // 6. Per-column type detection & conversion + missing-value handling
  const columnInfo = [];
  let numericConversions = 0;
  let missingFilled = { number: 0, text: 0, date: 0, boolean: 0 };
  let totalMissing = 0;

  finalHeaders.forEach(h => {
    const rawValues = workingRows.map(r => r[h]);
    const type = typeOverrides[h] || detectType(rawValues);
    let missingCount = 0;

    workingRows.forEach(r => {
      let v = r[h];
      if(isEmptyVal(v)){
        missingCount++;
        return;
      }
      if(type === 'number' && typeof v === 'string'){
        const cleaned = v.replace(/,/g,'').trim();
        const n = Number(cleaned);
        if(!isNaN(n)){
          r[h] = n;
          numericConversions++;
        }
      } else if(type === 'boolean' && typeof v === 'string'){
        const s = v.trim().toLowerCase();
        if(s === 'true' || s === 'yes') r[h] = true;
        else if(s === 'false' || s === 'no') r[h] = false;
      } else if(type === 'text' && typeof v === 'string'){
        // standardize common case issues: collapse weird casing on short categorical-looking text left as-is
        r[h] = v;
      }
    });

    totalMissing += missingCount;

    // Fill missing values
    let fillStrategy = null;
    let fillValue = null;
    if(missingCount > 0){
      if(type === 'number'){
        const nums = workingRows.map(r => r[h]).filter(v => typeof v === 'number' && !isNaN(v));
        if(nums.length > 0){
          const sorted = [...nums].sort((a,b)=>a-b);
          const mid = Math.floor(sorted.length/2);
          fillValue = sorted.length % 2 ? sorted[mid] : (sorted[mid-1]+sorted[mid])/2;
          fillStrategy = 'median';
        } else {
          fillValue = 0;
          fillStrategy = 'zero';
        }
      } else if(type === 'boolean'){
        fillValue = false;
        fillStrategy = 'default (false)';
      } else if(type === 'date'){
        fillStrategy = 'left blank';
      } else {
        fillValue = 'Unknown';
        fillStrategy = 'placeholder';
      }

      if(fillStrategy !== 'left blank'){
        workingRows.forEach(r => {
          if(isEmptyVal(r[h])){
            r[h] = fillValue;
            missingFilled[type] = (missingFilled[type]||0) + 1;
          }
        });
      }
    }

    // Descriptive statistics (mean, median, std dev, etc.) for numeric columns
    let stats = null;
    if(type === 'number'){
      const nums = workingRows.map(r => r[h]).filter(v => typeof v === 'number' && !isNaN(v));
      stats = computeStats(nums);
    }

    // Outlier detection (IQR method) for numeric columns
    let outlierCount = 0;
    let bounds = null;
    if(type === 'number' && stats && stats.count >= 4){
      const iqr = stats.q3 - stats.q1;
      const lowerBound = stats.q1 - 1.5*iqr;
      const upperBound = stats.q3 + 1.5*iqr;
      bounds = { lowerBound, upperBound, q1: stats.q1, q3: stats.q3 };
      const nums = workingRows.map(r => r[h]).filter(v => typeof v === 'number' && !isNaN(v));
      outlierCount = nums.filter(n => n < lowerBound || n > upperBound).length;
    }

    // Distribution data for charts
    let distribution = null;
    if(type === 'number'){
      const nums = workingRows.map(r => r[h]).filter(v => typeof v === 'number' && !isNaN(v));
      if(nums.length > 0){
        let min = nums[0], max = nums[0];
        for(let i=1;i<nums.length;i++){ if(nums[i]<min) min=nums[i]; if(nums[i]>max) max=nums[i]; }
        const binCount = 10;
        const range = max - min;
        const binSize = range === 0 ? 1 : range / binCount;
        const bins = Array.from({length: binCount}, (_, i) => ({
          rangeStart: min + i*binSize,
          rangeEnd: min + (i+1)*binSize,
          count: 0
        }));
        nums.forEach(n => {
          let idx = range === 0 ? 0 : Math.floor((n - min) / binSize);
          if(idx >= binCount) idx = binCount - 1;
          if(idx < 0) idx = 0;
          bins[idx].count++;
        });
        distribution = { kind: 'numeric', bins, min, max };
      }
    } else if(type === 'text' || type === 'boolean'){
      const counts = {};
      workingRows.forEach(r => {
        const v = r[h];
        if(isEmptyVal(v)) return;
        const key = String(v);
        counts[key] = (counts[key] || 0) + 1;
      });
      const entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
      const top = entries.slice(0, 8);
      const otherCount = entries.slice(8).reduce((s,[,c]) => s+c, 0);
      const categories = top.map(([label,count]) => ({label, count}));
      if(otherCount > 0) categories.push({label: 'Other', count: otherCount});
      distribution = { kind: 'categorical', categories };
    }

    columnInfo.push({
      name: h,
      type,
      detectedType: detectType(rawValues),
      missingCount,
      fillStrategy,
      fillValue,
      uniqueCount: new Set(workingRows.map(r => JSON.stringify(r[h]))).size,
      outlierCount,
      bounds,
      stats,
      distribution,
      mergeSuggestions: mergeSuggestionsByColumn[h] || []
    });
  });

  if(columnInfo.some(c => c.outlierCount > 0)){
    const totalOutliers = columnInfo.reduce((s,c) => s + (c.outlierCount||0), 0);
    log.push({ tag: 'outliers', text: `Flagged ${totalOutliers.toLocaleString()} potential outlier value${totalOutliers>1?'s':''} across numeric columns (values far outside the typical range — kept in the data, not removed).`, empty: true });
  }

  if(numericConversions > 0){
    log.push({ tag: 'types', text: `Converted ${numericConversions.toLocaleString()} text value${numericConversions>1?'s':''} that looked like numbers into actual numbers (removing thousands separators).` });
  }
  Object.entries(missingFilled).forEach(([type, count]) => {
    if(count > 0){
      const desc = type === 'number' ? 'filled with the column median' :
                    type === 'boolean' ? 'filled with "false"' :
                    'filled with "Unknown"';
      log.push({ tag: 'missing values', text: `Filled ${count.toLocaleString()} missing ${type} value${count>1?'s':''} (${desc}).` });
    }
  });
  const dateBlank = columnInfo.filter(c=>c.type==='date' && c.missingCount>0).reduce((s,c)=>s+c.missingCount,0);
  if(dateBlank > 0){
    log.push({ tag: 'missing values', text: `Left ${dateBlank.toLocaleString()} missing date value${dateBlank>1?'s':''} blank (no safe default for dates).`, empty:true });
  }

  if(log.length === 0){
    log.push({ tag: 'clean', text: 'No issues found — this dataset was already tidy.' });
  }

  return {
    cleanedRows: workingRows,
    headers: finalHeaders,
    columnInfo,
    report: {
      originalRowCount,
      originalColCount,
      finalRowCount: workingRows.length,
      finalColCount: finalHeaders.length,
      emptyRowsRemoved,
      dupeRowsRemoved,
      totalMissing,
      trimmedCells
    },
    log
  };
}

/* ---------------------------------------------------------------
   FILE PARSING
----------------------------------------------------------------*/
function parseFile(file){
  return new Promise((resolve, reject) => {
    const ext = file.name.split('.').pop().toLowerCase();
    if(ext === 'csv'){
      Papa.parse(file, {
        header: true,
        skipEmptyLines: false,
        dynamicTyping: false,
        complete: (res) => {
          const headers = res.meta.fields || [];
          resolve({ rows: res.data, headers });
        },
        error: (err) => reject(err)
      });
    } else if(ext === 'xlsx' || ext === 'xls'){
      const reader = new FileReader();
      reader.onload = (e) => {
        try{
          const data = new Uint8Array(e.target.result);
          const wb = XLSX.read(data, { type: 'array' });
          const sheetName = wb.SheetNames[0];
          const sheet = wb.Sheets[sheetName];
          const json = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
          const headers = json.length > 0 ? Object.keys(json[0]) : [];
          resolve({ rows: json, headers });
        }catch(err){ reject(err); }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    } else {
      reject(new Error('Unsupported file type. Please upload a .csv or .xlsx file.'));
    }
  });
}

/* ---------------------------------------------------------------
   DOWNLOAD HELPERS
----------------------------------------------------------------*/
function downloadCSV(rows, headers, filename){
  const csv = Papa.unparse({ fields: headers, data: rows.map(r => headers.map(h => r[h])) });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  triggerDownload(blob, filename.replace(/\.[^.]+$/, '') + '_cleaned.csv');
}
function downloadXLSX(rows, headers, filename){
  const ws = XLSX.utils.json_to_sheet(rows, { header: headers });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Cleaned data');
  XLSX.writeFile(wb, filename.replace(/\.[^.]+$/, '') + '_cleaned.xlsx');
}
function triggerDownload(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function formatNum(n){
  if(n === null || n === undefined || isNaN(n)) return '—';
  if(Math.abs(n) >= 1000) return Math.round(n).toLocaleString();
  return (Math.round(n * 100) / 100).toString();
}

// Compute descriptive statistics for a numeric array: mean, median, std dev,
// min, max, range, and quartiles.
function computeStats(nums){
  if(!nums || nums.length === 0) return null;
  const sorted = [...nums].sort((a,b)=>a-b);
  const n = sorted.length;
  const sum = sorted.reduce((s,v)=>s+v, 0);
  const mean = sum / n;
  const variance = sorted.reduce((s,v)=> s + (v-mean)*(v-mean), 0) / n;
  const std = Math.sqrt(variance);
  const q = (p) => {
    const idx = (n - 1) * p;
    const lo = Math.floor(idx), hi = Math.ceil(idx);
    return sorted[lo] + (sorted[hi]-sorted[lo]) * (idx - lo);
  };
  const median = q(0.5);
  const min = sorted[0];
  const max = sorted[n-1];
  return {
    count: n,
    mean,
    median,
    std,
    min,
    max,
    range: max - min,
    q1: q(0.25),
    q3: q(0.75)
  };
}

/* ---------------------------------------------------------------
   HISTORY: per-user analysis history stored in localStorage
----------------------------------------------------------------*/
const HISTORY_MAX_ENTRIES = 20; // cap per user
const HISTORY_MAX_DATA_BYTES = 4 * 1024 * 1024; // 4MB per entry data cap

function historyKey(userEmail){ return 'tidy_history_' + userEmail.replace(/[^a-z0-9]/gi,'_'); }

function loadHistory(userEmail){
  try{
    const raw = localStorage.getItem(historyKey(userEmail));
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}

function saveHistory(userEmail, entries){
  try{
    localStorage.setItem(historyKey(userEmail), JSON.stringify(entries));
    return true;
  }catch(e){ return false; }
}

function addHistoryEntry(userEmail, entry){
  const entries = loadHistory(userEmail);
  entries.unshift(entry); // newest first
  const trimmed = entries.slice(0, HISTORY_MAX_ENTRIES);
  return saveHistory(userEmail, trimmed);
}

function deleteHistoryEntry(userEmail, id){
  const entries = loadHistory(userEmail).filter(e => e.id !== id);
  return saveHistory(userEmail, entries);
}

function clearHistory(userEmail){
  try{ localStorage.removeItem(historyKey(userEmail)); return true; }
  catch(e){ return false; }
}

function estimateStorageUsedKB(userEmail){
  try{
    const raw = localStorage.getItem(historyKey(userEmail)) || '';
    return Math.round(raw.length * 2 / 1024); // UTF-16 = 2 bytes/char
  }catch(e){ return 0; }
}

function serializeDataForHistory(rows, headers){
  // Serialize cleaned rows + headers to a compact JSON string.
  // Returns { data: string, sizeBytes: number } or null if too large.
  try{
    const str = JSON.stringify({ rows, headers });
    if(str.length * 2 > HISTORY_MAX_DATA_BYTES) return null; // too large
    return { data: str, sizeBytes: str.length * 2 };
  }catch(e){ return null; }
}

function deserializeHistoryData(dataStr){
  try{ return JSON.parse(dataStr); }
  catch(e){ return null; }
}

const FORMS_KEY = 'tidy_forms';
const RESPONSES_KEY_PREFIX = 'tidy_responses_';
const memoryFormsStore = { forms: {}, responses: {} };

function loadForms(){

}
function saveForms(forms){

}
function loadResponses(formId){

function saveResponses(formId, responses){

  catch(e){ memoryFormsStore.responses[formId] = responses; }

const QUESTION_TYPES = [
  { type:'text', label:'Text', icon:'Aa', color:'number' },
  { type:'number', label:'Number (integer)', icon:'#', color:'number' },
  { type:'decimal', label:'Number (decimal)', icon:'#.#', color:'number' },
  { type:'select_one', label:'Select one', icon:'◉', color:'text' },
  { type:'select_multiple', label:'Select multiple', icon:'☑', color:'text' },
  { type:'date', label:'Date', icon:'📅', color:'date' },
  { type:'datetime', label:'Date & time', icon:'🕐', color:'date' },
  { type:'geopoint', label:'GPS location', icon:'📍', color:'boolean' },
  { type:'image', label:'Photo / file upload', icon:'🖼', color:'pink' },
  { type:'note', label:'Note (display only)', icon:'¶', color:'amber' },
  { type:'group', label:'Group', icon:'▤', color:'teal' },
  { type:'repeat', label:'Repeat group', icon:'⟲', color:'coral' },
];

function newQuestion(type){
  const id = 'q_' + Math.random().toString(36).slice(2, 10);
  const base = {
    id, type,
    label: '',
    required: false,
    relevant: { enabled:false, questionId:'', operator:'equals', value:'' },
    hint: '',
  };
  if(type === 'select_one' || type === 'select_multiple'){
    base.choices = [{ id:'c1', label:'Option 1' }, { id:'c2', label:'Option 2' }];
  }
  if(type === 'number' || type === 'decimal'){
    base.min = ''; base.max = '';
  }
  if(type === 'group' || type === 'repeat'){
    base.children = [];
  }
  return base;
}

function newForm(){
  return {
    id: 'f_' + Math.random().toString(36).slice(2, 10),
    title: 'Untitled form',
    description: '',
    createdAt: new Date().toISOString(),
    questions: [],
  };
}

// Flatten a form's questions (including nested group children, not repeat children)
// for use in skip-logic dropdowns.
function flattenQuestions(questions){
  let out = [];
  for(const q of questions){
    if(q.type === 'note') continue;
    out.push(q);
    if(q.type === 'group' && q.children) out = out.concat(flattenQuestions(q.children));
  }
  return out;
}

// Evaluate whether a question should be shown, given current answers and its relevant rule.
function isRelevant(q, answers){
  if(!q.relevant || !q.relevant.enabled || !q.relevant.questionId) return true;
  const actual = answers[q.relevant.questionId];
  const target = q.relevant.value;
  switch(q.relevant.operator){
    case 'equals': return String(actual ?? '') === String(target);
    case 'not_equals': return String(actual ?? '') !== String(target);
    case 'answered': return actual !== undefined && actual !== '' && actual !== null;
    case 'not_answered': return actual === undefined || actual === '' || actual === null;
    default: return true;
  }
}

// Build a flat set of column headers from a form's question tree, for CSV/XLSX export.
function formToHeaders(questions, prefix = ''){
  let headers = [];
  for(const q of questions){
    if(q.type === 'note') continue;
    if(q.type === 'group' && q.children){
      headers = headers.concat(formToHeaders(q.children, prefix));
    } else if(q.type === 'repeat'){
      headers.push(prefix + (q.label || q.id) + ' (count)');
    } else {
      headers.push(prefix + (q.label || q.id));
    }
  }
  return headers;
}

// Flatten a single response's answers into a row matching formToHeaders order.
function responseToRow(questions, answers, prefix = ''){
  let row = {};
  for(const q of questions){
    if(q.type === 'note') continue;
    const key = prefix + (q.label || q.id);
    if(q.type === 'group' && q.children){
      row = {...row, ...responseToRow(q.children, answers, prefix)};
    } else if(q.type === 'repeat'){
      const instances = answers[q.id] || [];
      row[key + ' (count)'] = instances.length;
    } else if(q.type === 'geopoint'){
      const v = answers[q.id];
      row[key] = v ? `${v.lat}, ${v.lon}` : '';
    } else if(q.type === 'select_multiple'){
      const v = answers[q.id];
      row[key] = Array.isArray(v) ? v.join(' | ') : (v || '');
    } else if(q.type === 'image'){
      const v = answers[q.id];
      row[key] = v ? v.name : '';
    } else {
      row[key] = answers[q.id] ?? '';
    }
  }
  return row;
}

/* ---------------------------------------------------------------
   COLLECT: Question editor (single question card, recursive for groups)
----------------------------------------------------------------*/
function QuestionEditor({ q, onChange, onDelete, onMoveUp, onMoveDown, allQuestions, depth = 0 }){
  const update = (patch) => onChange({ ...q, ...patch });
  const meta = QUESTION_TYPES.find(t => t.type === q.type) || {};
  const otherQuestions = flattenQuestions(allQuestions).filter(o => o.id !== q.id);

  const addChild = (type) => {
    update({ children: [...(q.children||[]), newQuestion(type)] });
  };
  const updateChild = (idx, nextChild) => {
    const children = [...q.children];
    children[idx] = nextChild;
    update({ children });
  };
  const deleteChild = (idx) => {
    update({ children: q.children.filter((_,i)=>i!==idx) });
  };
  const moveChild = (idx, dir) => {
    const children = [...q.children];
    const j = idx + dir;
    if(j < 0 || j >= children.length) return;
    [children[idx], children[j]] = [children[j], children[idx]];
    update({ children });
  };

  return (
    <div className={"question-card" + (q.type==='group' ? ' is-group' : '') + (q.type==='repeat' ? ' is-repeat' : '')}>
      <div className="q-head">
        <span className="q-badge" style={{background:`var(--c-${meta.color}-soft)`, color:`var(--c-${meta.color})`}}>{meta.icon} {meta.label}</span>
        <div style={{flex:1}} />
        <button className="icon-btn move" onClick={onMoveUp} title="Move up">↑</button>
        <button className="icon-btn move" onClick={onMoveDown} title="Move down">↓</button>
        <button className="icon-btn" onClick={onDelete} title="Delete question">✕</button>
      </div>

      <div className="q-row">
        <input type="text" style={{flex:2,minWidth:'220px'}} placeholder="Question label"
          value={q.label} onChange={e=>update({label:e.target.value})} />
        <label className="inline">
          <input type="checkbox" checked={q.required} onChange={e=>update({required:e.target.checked})} />
          Required
        </label>
      </div>
      <div className="q-row">
        <input type="text" style={{flex:1}} placeholder="Hint / help text (optional)"
          value={q.hint||''} onChange={e=>update({hint:e.target.value})} />
      </div>

      {(q.type === 'number' || q.type === 'decimal') && (
        <div className="q-row">
          <input type="number" placeholder="Min (optional)" style={{width:'140px'}}
            value={q.min} onChange={e=>update({min:e.target.value})} />
          <input type="number" placeholder="Max (optional)" style={{width:'140px'}}
            value={q.max} onChange={e=>update({max:e.target.value})} />
        </div>
      )}

      {(q.type === 'select_one' || q.type === 'select_multiple') && (
        <div style={{marginTop:'8px'}}>
          {q.choices.map((c, ci) => (
            <div className="choice-row" key={c.id}>
              <input type="text" value={c.label} onChange={e=>{
                const choices = [...q.choices];
                choices[ci] = {...c, label:e.target.value};
                update({choices});
              }} />
              <button className="icon-btn" onClick={()=>update({choices:q.choices.filter((_,i)=>i!==ci)})} title="Remove option">✕</button>
            </div>
          ))}
          <button className="btn-sm" onClick={()=>update({choices:[...q.choices, {id:'c'+Math.random().toString(36).slice(2,8), label:`Option ${q.choices.length+1}`}]})}>+ Add option</button>
        </div>
      )}

      {otherQuestions.length > 0 && q.type !== 'note' && (
        <div className="q-row" style={{marginTop:'10px',paddingTop:'10px',borderTop:'1px dashed var(--line)'}}>
          <label className="inline">
            <input type="checkbox" checked={q.relevant.enabled}
              onChange={e=>update({relevant:{...q.relevant, enabled:e.target.checked}})} />
            Only show if
          </label>
          {q.relevant.enabled && (
            <React.Fragment>
              <select value={q.relevant.questionId} onChange={e=>update({relevant:{...q.relevant, questionId:e.target.value}})}>
                <option value="">Select question...</option>
                {otherQuestions.map(oq => <option key={oq.id} value={oq.id}>{oq.label || '(untitled)'}</option>)}
              </select>
              <select value={q.relevant.operator} onChange={e=>update({relevant:{...q.relevant, operator:e.target.value}})}>
                <option value="equals">equals</option>
                <option value="not_equals">does not equal</option>
                <option value="answered">is answered</option>
                <option value="not_answered">is not answered</option>
              </select>
              {(q.relevant.operator === 'equals' || q.relevant.operator === 'not_equals') && (
                <input type="text" placeholder="value" style={{width:'120px'}}
                  value={q.relevant.value} onChange={e=>update({relevant:{...q.relevant, value:e.target.value}})} />
              )}
            </React.Fragment>
          )}
        </div>
      )}

      {(q.type === 'group' || q.type === 'repeat') && (
        <div className="nested-children">
          {(q.children||[]).map((child, ci) => (
            <QuestionEditor
              key={child.id}
              q={child}
              allQuestions={allQuestions}
              depth={depth+1}
              onChange={(next)=>updateChild(ci, next)}
              onDelete={()=>deleteChild(ci)}
              onMoveUp={()=>moveChild(ci, -1)}
              onMoveDown={()=>moveChild(ci, 1)}
            />
          ))}
          <div className="qtype-grid">
            {QUESTION_TYPES.filter(t => depth === 0 || (t.type !== 'group' && t.type !== 'repeat')).map(t => (
              <button key={t.type} className="qtype-btn" onClick={()=>addChild(t.type)}>
                <span className="qi">{t.icon}</span> {t.label}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

----------------------------------------------------------------*/
function FormBuilder({ form, onSave, onBack }){
  const [draft, setDraft] = useState(form);

  const addQuestion = (type) => {
    setDraft({...draft, questions:[...draft.questions, newQuestion(type)]});
  };
  const updateQuestion = (idx, next) => {
    const questions = [...draft.questions];
    questions[idx] = next;
    setDraft({...draft, questions});
  };
  const deleteQuestion = (idx) => {
    setDraft({...draft, questions: draft.questions.filter((_,i)=>i!==idx)});
  };
  const moveQuestion = (idx, dir) => {
    const questions = [...draft.questions];
    const j = idx + dir;
    if(j < 0 || j >= questions.length) return;
    [questions[idx], questions[j]] = [questions[j], questions[idx]];
    setDraft({...draft, questions});
  };

  return (
    <div>
      <div className="q-row" style={{alignItems:'center',marginBottom:'18px'}}>
        <button className="btn-sm" onClick={onBack}>&larr; Back to forms</button>

        <button className="btn" onClick={()=>onSave(draft)}>Save form</button>
      </div>

      <div className="q-row">
        <input type="text" style={{flex:2,fontSize:'16px',fontWeight:600}} placeholder="Form title"
          value={draft.title} onChange={e=>setDraft({...draft, title:e.target.value})} />
      </div>
      <div className="q-row">
        <textarea style={{flex:1,minHeight:'50px'}} placeholder="Form description (optional)"
          value={draft.description} onChange={e=>setDraft({...draft, description:e.target.value})} />

      <p className="section-label" style={{marginTop:'24px'}}>Questions ({draft.questions.length})</p>

      {draft.questions.map((q, qi) => (

          q={q}
          allQuestions={draft.questions}
          onChange={(next)=>updateQuestion(qi, next)}
          onDelete={()=>deleteQuestion(qi)}

        />

      <p className="section-label" style={{marginTop:'20px'}}>Add a question</p>

        {QUESTION_TYPES.map(t => (

          </button>
        ))}
      </div>
    </div>

}

/* ---------------------------------------------------------------
   COLLECT: Form Filler (single field renderer + recursive group/repeat)
----------------------------------------------------------------*/
function FieldInput({ q, value, onChange }){
  if(q.type === 'text'){
    return <textarea rows={2} value={value||''} onChange={e=>onChange(e.target.value)} />;
  }
  if(q.type === 'number'){
    return <input type="number" step="1" value={value??''} onChange={e=>onChange(e.target.value===''?'':Number(e.target.value))} />;
  }
  if(q.type === 'decimal'){
    return <input type="number" step="any" value={value??''} onChange={e=>onChange(e.target.value===''?'':Number(e.target.value))} />;
  }
  if(q.type === 'date'){
    return <input type="date" value={value||''} onChange={e=>onChange(e.target.value)} />;
  }
  if(q.type === 'datetime'){
    return <input type="datetime-local" value={value||''} onChange={e=>onChange(e.target.value)} />;
  }
  if(q.type === 'select_one'){
    return (
      <div>
        {q.choices.map(c => (
          <div key={c.id} className={"choice-option"+(value===c.label?' selected':'')} onClick={()=>onChange(c.label)}>
            <input type="radio" checked={value===c.label} readOnly /> {c.label}
          </div>
        ))}
      </div>
    );
  }
  if(q.type === 'select_multiple'){
    const arr = Array.isArray(value) ? value : [];
    const toggle = (label) => {
      onChange(arr.includes(label) ? arr.filter(v=>v!==label) : [...arr, label]);
    };
    return (
      <div>
        {q.choices.map(c => (
          <div key={c.id} className={"choice-option"+(arr.includes(c.label)?' selected':'')} onClick={()=>toggle(c.label)}>
            <input type="checkbox" checked={arr.includes(c.label)} readOnly /> {c.label}
          </div>
        ))}
      </div>
    );
  }
  if(q.type === 'geopoint'){
    const [status, setStatus] = useState('idle');
    const capture = () => {
      if(!navigator.geolocation){ setStatus('unsupported'); return; }
      setStatus('locating');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          onChange({ lat: pos.coords.latitude.toFixed(6), lon: pos.coords.longitude.toFixed(6) });
          setStatus('done');
        },
        () => setStatus('denied'),
        { timeout: 10000 }
      );
    };
    return (
      <div className="geo-box">
        <button type="button" className="btn-sm primary" onClick={capture}>📍 Capture GPS location</button>
        {value && <span className="geo-result">{value.lat}, {value.lon}</span>}
        {status==='locating' && <span className="hint">Locating...</span>}
        {status==='denied' && <span className="hint">Location permission denied.</span>}
        {status==='unsupported' && <span className="hint">Geolocation not supported in this browser.</span>}
      </div>
    );
  }
  if(q.type === 'image'){
    return (
      <div>
        <input type="file" accept="image/*,application/pdf" onChange={e=>{
          const file = e.target.files[0];
          if(file) onChange({ name: file.name, size: file.size });
        }} />
        {value && <div className="hint" style={{marginTop:'6px'}}>Selected: {value.name}</div>}
      </div>
    );
  }
  return null;
}

function GroupFiller({ q, answers, setAnswer, allTop }){
  return (
    <div className="group-box">
      <div className="group-title">{q.label || 'Group'}</div>
      {q.children.filter(c => isRelevant(c, answers)).map(c => (
        <QuestionFillBlock key={c.id} q={c} answers={answers} setAnswer={setAnswer} />
      ))}
    </div>
  );
}

function RepeatFiller({ q, instances, setInstances }){
  const list = instances || [];
  const updateInstance = (idx, key, val) => {
    const next = [...list];
    next[idx] = {...next[idx], [key]: val};
    setInstances(next);
  };
  const addInstance = () => setInstances([...list, {}]);
  const removeInstance = (idx) => setInstances(list.filter((_,i)=>i!==idx));

  return (
    <div className="group-box" style={{background:'var(--c-amber-soft)'}}>
      <div className="group-title" style={{color:'var(--c-amber)'}}>{q.label || 'Repeat group'} ({list.length})</div>
      {list.map((inst, idx) => (
        <div className="repeat-instance" key={idx}>
          <button type="button" className="icon-btn ri-remove" onClick={()=>removeInstance(idx)} title="Remove entry">✕</button>
          <div className="hint" style={{marginBottom:'10px'}}>Entry {idx+1}</div>
          {q.children.filter(c => isRelevant(c, inst)).map(c => (
            <div className="fill-q" key={c.id}>
              <label>{c.label}{c.required && <span className="req-star">*</span>}</label>
              <FieldInput q={c} value={inst[c.id]} onChange={(v)=>updateInstance(idx, c.id, v)} />
            </div>
          ))}
        </div>
      ))}
      <button type="button" className="btn-sm" onClick={addInstance}>+ Add another entry</button>
    </div>
  );
}

function QuestionFillBlock({ q, answers, setAnswer }){
  if(!isRelevant(q, answers)) return null;
  if(q.type === 'note'){
    return <div className="fill-q"><p className="hint" style={{fontSize:'13px'}}>{q.label}</p></div>;
  }
  if(q.type === 'group'){
    return <GroupFiller q={q} answers={answers} setAnswer={setAnswer} />;
  }
  if(q.type === 'repeat'){
    return <RepeatFiller q={q} instances={answers[q.id]} setInstances={(v)=>setAnswer(q.id, v)} />;
  }
  return (
    <div className="fill-q">
      <label>{q.label || '(untitled question)'}{q.required && <span className="req-star">*</span>}</label>
      {q.hint && <div className="hint">{q.hint}</div>}
      <FieldInput q={q} value={answers[q.id]} onChange={(v)=>setAnswer(q.id, v)} />
    </div>
  );
}

function FormFillScreen({ form, onSubmit, onCancel }){
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const setAnswer = (id, val) => setAnswers(a => ({...a, [id]: val}));

  const validate = () => {
    const flat = flattenQuestions(form.questions);
    for(const q of flat){
      if(!isRelevant(q, answers)) continue;
      if(q.type === 'group' || q.type === 'repeat') continue;
      if(q.required){
        const v = answers[q.id];
        const empty = v === undefined || v === '' || v === null || (Array.isArray(v) && v.length===0);
        if(empty) return `"${q.label || 'A question'}" is required.`;
      }
      if((q.type === 'number' || q.type === 'decimal') && answers[q.id] !== undefined && answers[q.id] !== ''){
        const v = Number(answers[q.id]);
        if(q.min !== '' && q.min !== undefined && v < Number(q.min)) return `"${q.label}" must be at least ${q.min}.`;
        if(q.max !== '' && q.max !== undefined && v > Number(q.max)) return `"${q.label}" must be at most ${q.max}.`;
      }
    }
    return null;
  };

  const [err, setErr] = useState('');
  const submit = () => {
    const v = validate();
    if(v){ setErr(v); return; }
    setErr('');
    onSubmit(answers);
    setSubmitted(true);
  };

  if(submitted){
    return (
      <div className="empty-state">
        <div className="icon">✓</div>
        <h2>Response submitted</h2>
        <p>Thank you. Your response has been saved.</p>
        <div className="q-row" style={{justifyContent:'center',marginTop:'16px'}}>
          <button className="btn" onClick={()=>{ setAnswers({}); setSubmitted(false); }}>Submit another response</button>
          <button className="btn secondary" onClick={onCancel}>Back to forms</button>
        </div>
      </div>
    );
  }

  return (
    <div className="fill-form">
      <div className="q-row" style={{marginBottom:'18px'}}>
        <button className="btn-sm" onClick={onCancel}>&larr; Back</button>
      </div>
      <h2 style={{marginBottom:'6px'}}>{form.title}</h2>
      {form.description && <p style={{color:'var(--ink-soft)',fontSize:'13px',marginBottom:'24px'}}>{form.description}</p>}

      {form.questions.filter(q => isRelevant(q, answers)).map(q => (
        <QuestionFillBlock key={q.id} q={q} answers={answers} setAnswer={setAnswer} />
      ))}

      {err && <div className="err-msg" style={{marginBottom:'14px'}}>{err}</div>}
      <button className="btn" onClick={submit}>Submit response</button>
    </div>
  );
}
